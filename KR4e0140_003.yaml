body:
  text: 吳文肅摘稿卷三明吳儼撰表疏恭賀登極表臣某等伏承五月十八日詔書恭聞皇帝陛下遵奉遺詔允升大寶臣等誠歡誠忭頓首頓首謹言乾旋坤轉九圍懷再造之仁日照月臨率土仰重熙之治慶騰寰宇歡溢華夷竊惟出震繼離正化成之攸始承祧踐阼視創業為尤難庶邦拭目以觀太平四海側耳以聽新政撫兆民而為子包六合以為家漢之傳世二十四君獨文景克紹其美周之享國八百餘嵗惟成康能擅其名恭惟皇帝陛下睿知夙成聰明天縱青宫主鬯式彰三善之名寶厯在躬爰作百神之主秉璧而見上帝端冕以臨羣臣幽明感通遐邇昭泰和氣流於八表祥光燭於九垓孝養兩宫日勤三至明禋七廟昭格一心立舜木以求針銘湯盤而致警諒暗恭默當寧憂勤來嵗改元不忍急於更化即辰肆眚乃先示乎薄刑逋負雖大而必蠲勤勞雖小而亦録近則市不易肆逺則海不揚波九夷八蠻悉臣悉貢六府三事惟叙惟歌澤覃莫大之封疆仁被無知之草木化殆成於朞月治何待乎三年伏願居安思危慎終如始念祖宗付豫之重思王業保守之艱節用愛民清心寡欲緝熙聖學容納善言親近老成之人安享和平之福固皇圖於不拔衍聖祚於無疆臣等分事守官盡治留都之職上章勸進莫參法從之班望雖邈乎山川心實馳於象魏想黃朱之贄如瞻嗣德之容誦明良之歌用副責難之義歡呼蹈舞倍萬恆情臣無任瞻天仰聖激切屏營之至謹奉表稱賀以聞奏請回鑾疏謹奏為回聖駕以安人心事臣等初聞聖駕出京幸昌平等處曾具疏瀆冒聖聰言詞蹇拙不蒙採納既而又聞八月念八日聖駕復出過居庸關幸宣府又幸大同宰輔不及知羣臣不及從三軍之士不及衛護以行臣等戰懼驚惶罔測聖意之所在伏而思之是必敵兵縱橫邉報急數陛下慮羣帥之不力憫邉氓之被俘急於制馭遂不暇咨之廟堂謀之帷幄而行耳不然沙漠之凄涼决不若京師之富麗邉塞之馳驅决不若宫禁之尊嚴陛下奚取於此而輕身以幸之哉古之聖帝明王不能無外侮之患三苖不服虞舜固征之矣而奉辭伐罪乃責之大禹舜實未嘗自征獫狁孔熾周宣固伐之矣而出師致討乃責之尹吉甫周宣實未嘗自伐載之詩書昭然可考今在廷之臣文武如林寧無一人忠貞謀勇可以委任而陛下必欲自行耶夫君居其逸臣任其勞此古今之大義若天冠地履不可得而易者今陛下自任其勞而以逸遺臣下是愛身不若愛臣下之深也無乃倒置與聖駕初出之時臣民引領北望皆謂回鑾必在九月萬夀聖節則天下之朝賀者畢至四方之貢獻者在廷豈宜使之空行九月過後又謂回鑾必在十一月長至令節則九廟有嵗享之大祭兩宫有慶賀之大禮豈宜遣人以代十一月過後日望一日今又過元旦若干日矣聖駕已回逺不能知萬一未回則郊祀大禮古今所重尤非臣下所敢代者將遂缺而不舉與若謂敵尚在邉必待敵退而後聖駕可回與萬萬無此理且京師者天下根本之地郊社宗廟於此乎建立宫殿陵寢於此乎奠安羣臣百工於此乎㑹萃三軍萬姓於此乎長育財貨珍寶子女玉帛皆於此乎輻輳外之郡國雖或有一二富庶必不及京師萬分之一况逺在邉徼者乎譬諸人身京師猶腹心也郡國猶肩背腰膂也邉徼則四肢也腹心安然後肩背腰膂安肩背腰膂安然後四肢無恙今有人焉養其四肢而心腹之不安則不顧是可謂之善養身乎况今京師內外人心搖動口語藉藉轉相傳播徐淮以南荒饉千里去冬三月雨雪為災民無衣食至於父子漂流兄弟離散略不係戀間有自經及投水而死者民窮至此安保其不為盜哉臣等恐所禦之敵尚逺隔於隂山而不虞之患或猝起于肘腋此不可以不煩聖慮也伏望皇上念九廟之統緒思兩宫之付托審內外之輕重恤黔黎之窮困速回聖駕端居九五修眀政教委任賢才則百廢盡舉四海來王無復北顧之憂矣臣等縻祿留都山川修阻限不能俯伏道左扣馬泣諌不勝惶恐戰懼之至為此具本謹遣辦事官賫捧謹具奏聞論為臣不易正德丁卯順天鄉試程式論曰人臣之職不容于不盡也而亦不容于易盡也何也為臣非難而事君為難事君非難而盡職為難職有不盡不足以為臣而可以易之乎世之自以為易者是不知其難也知而謂無所用力焉者是畏其難也知而不畏而猶日愒月玩無所事焉者是易其難也不知其難者不能為畏其難者不敢為易其難者自以為不足為則亦何職之能盡哉是以為人臣者不容不盡其職而亦不容以易盡歟孔子之告定公意有在矣此非孔子之言也當時有是言也亦非當時之言也虞廷有是言也大禹陳謨于舜不曰克艱厥臣乎蓋嘗論之君猶元首也臣猶股肱耳目也君資臣以成治猶元首資股肱耳目以成其身也君臣一體則臣之事君宜若易易矣而謂之難何哉嗚呼此正所以為難也衣人之衣者懷人之憂食人之食者任人之事而况號為一體者乎自一命之士而上至百官庶府均為王臣不可謂其不難然其任也小其責也輕至于受股肱耳目之寄則其責固有不同者矣而敢以為易乎且一人之身百責所萃震撼擊撞難于鎮定盤錯棼結難於解紓辛甘燥濕難於調劑黯暗汙濁難於茹納隂陽難於燮理風俗難于變化禮樂難明刑政難舉君子小人難辨辨而難於進退九夷八蠻在荒服之外者難于賓服鳥獸草木之妖難於消滅龜麟龍鳳諸福之物可致之祥難於畢致是皆吾一人之責也吾之責吾不能盡猶為股肱而不能輔翼耳目而不能視聼元首何賴於爾而亦何以股肱耳目為哉此正所以為難也若此者其難在我我猶得而勉焉而其不在我者則非吾力之所能為也何也其始進也見任之難其既任也見信之難及其既信也有終之難昔者舜之于禹可謂知之深矣必待四嶽之舉而後命以百揆之職其見任不亦難乎舅犯從文公于外者十有九年可謂任之久矣及其反也猶不能無疑至沉璧以誓其見信不亦難乎周公之于成王以叔父之親居冢宰之位可謂信之専矣而三叔流言避居東都使非雷風之變其心終無以自明其有終不亦難乎是三者得之于君而前之所謂難者一有不盡又將諉之誰哉是故阿順以為容逢迎以為悅吾有爵祿之榮而不罹拂逆之患可以無難矣而非大臣之所冝也去國而逺害潔身以為髙我有優遊之樂而不與危亂之憂可以無難矣而非大臣之所忍也直言而極諌身亡而國危我有後世之名而不救覆亡之禍可以無難矣而非大臣之所願也然則果何如而後可以盡其職哉必也正已必也有容必也鞠躬盡瘁必也陳善而責難必也進思盡忠退思補過而不敢以為勞必也知無不言言無不盡而不敢以為直必也國爾忘家公爾忘私而不敢以為忠必也利不茍就害不茍避而不敢以為義必也有蹇蹇匪躬之節必也有翼翼小心之恭必也有素絲之風而無愧赧之容必也有赤舄之安而無顧慮之態然後大臣之職庶乎其少盡耳彼不知其難與畏其難者固不足論而易其難者又自以為不足為而以怠心乘之則雖有髙天下之才絶天下之智亦終于敗而已矣何足以事君也哉雖然為臣固不易矣至為君之難則尤有甚焉者以一身而處萬民之上以一日而有萬幾之繁故智不足以周天下之務則邪正不明德不足以服天下之心則政令不行一念不謹或貽四海之憂一日不謹或致千百年之患可以為易乎故為君者自知其難而又知為臣之難為臣者亦自知其難而又知為君之難兢兢業業上下交修則難者可易而天下之治亦無難矣序順天府鄉試録後序皇上嗣大厯服之初厲精圖治訓飭諸司惟舊章成憲是遵內外羣工莫不戰兢惕厲思自奮以副上意朞月之間政事之敝者以補偏者以正廢且墜者以修百度振舉議者以為有洪武永樂之風噫感應之效一何神速如此哉正德二年秋上命臣春臣某為順天府考試官試録既成臣某謹序諸後竊惟舊章成憲皆祖宗宸謨睿略以為聖子神孫億萬年之法未有遵之而過者今百司庶務皇上悉欲復祖宗之舊而况于文乎文非但可以華國也而于世道實有關焉至于程式之文其所關尤重何也上之所取下之所趨也其所取者雅則天下悉從而雅所取者浮則天下悉從而浮士習之正否于是乎判而可謂弗重矣乎洪惟我太祖髙皇帝創業之初天下甫定即命開科取士越十七年著為定令唐宋數百年間屢更屢易而未盡者至是益加精密焉故百四十年來守之弗失而文之體格則似不能無少變焉者臣嘗觀洪武永樂之間其文渾厚宣德正統之間其文簡明成化𢎞治之間其文竒麗可謂日益以盛矣然竒則鉤深摘隱其流漸入于晦麗則取青嫓紫其流漸至于澆為世道慮者能不思所以變之乎有宋嘉祐初士習險怪歐陽修深以為患痛加裁抑一時知名之士皆不在選物論雖若不平文體卒為之變識者韙之臣于修無能為役而心之為世道慮今亦何異于古故今日所取者匪徒以其文之工惟雅是崇焉其所棄者匪徒以其文之不工雖工而浮亦不免于黜焉自京畿而逹諸天下庶乎文之少變耳士習既正則他日出而從政亦罔敢弗正惡有作聰明亂舊章以自陷于浮薄者哉臣不佞思所以仰副上意者蓋有在于此故書以為登名于是者告并告夫未登者以圖後舉焉送上髙司訓徐君東之序都城之西都城隍廟在焉每月朔暨望則商賈畢集大者車載小者擔負又其小者挾持而往海內外所産物咸萃焉至則畫地為限界張肆以售持金帛相貿易者縱橫旁午于其中至不䏻行相排擠而入非但摩肩接踵而已遐方窮邑之人偶一觀之則驚嘆彌日向人嘖嘖誇詫不已至其夢寐亦然蓋平生之所未見意人皆已若雖欲不誇其心固不能自已也而凡人之至是者孰不欲一往哉今年吾友徐東之以貢至其隙也適其期也亦告豫以往日且晡未歸既而歸則暮矣豫怪其久也而叩之乃蹙頞而言曰豫之至也其羣集者已先據其衝閉其途矣而後之候其隙而入者猶若貫魚然而豫也不䏻從立于門而望之見肆之所列焉而猶恐其未也坐于道隅槖焉而充篚焉而盈䭾焉而上隆若川流之過乎前也豫得盡觀焉而猶恐其未也久而其過者益衆其羣乃解豫于是乃即而觀焉而駔猶謷謷且召且鬻也豫見夫文士之圖籍槧鉛武士之弓矢農之錢鏄鉏釤工之斧鑿刀鈇貴富者之眀珠大貝貧夫之敝衣敗屨兒童之㺯具婦女之粉黛脂澤以至道釋家之魚螺鐃鼓俳優家之􅌙筝簫管物物具焉而于古之所謂簠簋瑚璉彛鼎樽罍敦牟巵匜之屬獨一無所見何哉是豈售之各有其地邪豫曰古之器不鬻于今猶今之器不鬻于古也豈惟無所售之人將怪而駭之且毁之矣雖然不售于今無害其為古也世有好古君子則什襲而藏之矣人將求見而不可得而况于求售乎東之默識豫言唯唯而退居數日授上髙訓導來徴贈言于豫豫謂東之好古道學古文詞是蓋難鬻于今之世者今雖仕有官職而歲祿僅可具饘粥未可謂已售之器也兹行也其韞櫝以待慎無與何樓之物爭直于列市之肆哉送季丈光祿沈公謁告南還序光祿古重臣也成周之時內饔外饔亨人臘人以至酒漿醯醢之屬皆𨽻于冡宰任者不以為䙝任之者不以為煩豈重口腹然哉宗廟之祭祀百官之宴饗四方賓客之饋餼皆此焉出則其所以事神治人之道具矣冢宰佐王理邦國其職固如是也我朝設官置寺監于成周凡四方貢獻水陸方物可以為鼎爼籩豆之實備食飲膳修之用者皆受而藏之以時而供具焉是亦成周之遺制也然周之王畿不過千里外而五服山川之物産有限當時祀典視今不甚殊而宴饗饋餼之禮尤數未聞有匱乏者今天下之廣倍于成周其物之蕃從可知矣物不加少而供具不加多然猶恆以匱乏為憂無乃㑹之不以其道乎是固官司之所宜憂也吾季丈沈公拜官三月亟以疾去其亦有隱憂歟雖然公一署丞也丞之上有正焉而一時之長則有卿焉有為之佐者焉又有為之丞者焉其憂當有大于公者彼不以為憂而公乃以為憂乎雖然食人之食者憂人之事公之所憂固非分外事也夫知所以憂之則必圖所以㑹之矣為一署之丞者能圖所以㑹之其他為丞者又圖所以㑹之其大于丞者又圖所以㑹之尚何匱乏之足憂而成周之不可並乎公之歸吾于是乎有感送劉君克立還任屯留序屯留居上黨之脊山石磽磽而物産不能比數他邑民生其間多儉嗇而好爭訟錙銖不平相與告訐無已故常不安土居視去親戚墳墓如去傳舍漠然不加戚于中初洪武暨永樂時編氓滿萬戶今檢其版籍逃者十六七賦稅不能請以削而徭役或加焉雖其存者亦有臲􅑶不自安之意其所患豈獨在難治而已哉吏于斯者急之則無以保其民緩之則無以應乎上盻盻焉日望代去為幸雖欲安其位不可得也劉君克立以庚戌進士為其邑令知舊罔不為克立危者克立毅然往即所治視民之流亡如子弟之在拘縶招之來之又從而飲食之使葺其廬之廢者以居墾其田之蕪者以藝器有鋤斸種有粳稌畜有㹀犢皆受于官擇四鄉老以典其事日有程月有課嵗暮則計所復之户口以著于籍民之歸也無算焉某地有鐵冶廢而不治已數百年克立訪其遺法以教民凡釡錡錢鏄刀鈇之器急于民用者皆自取足四境之外持粟帛而貿易者接踵由是有無相通而財用益得以饒矣民欲徙而之他自度無安于此者其肯去父母之邦乎今年夏六月考三年績于吏部為一時之最適豫邑令缺伯舅謙齊少傅先生欲上請而更之命子諭以意克立有難色遂不敢强是匪徒民安克立而克立亦安于其民矣孔子曰君子學道則愛人克立其學道而有所愛者歟雖然古之時居官長子孫今則不然治縣三年有成績而又有薦之者法必遷今克立之績如是而薦書至再至三則其遷也蹻足可待克立雖欲久于屯留法可得乎豫固不䏻不為其民先憂也于其行八君子為之詩而豫為之序送白君輔之南還序世謂刑官之子孫多微好事者從而傅㑹其說遂謂臯陶亡後考之傳記臯陶之子孫實封英六故其冢至今在淮南而云亡後何也或曰臯陶之子孫不能世其官雖有猶無或曰五臣之後皆有天下而臯陶獨無故云理或然也說者又謂李之為姓自臯陶始臯陶為理官子孫以官為氏訛而為李至唐而亦有天下于五臣獨差遲耳其說信然刑官之子孫果微乎唐虞而下善治獄者莫若于定國然其父于公特一郡法曹耳自謂治獄有隂德令髙大其閭門可容駟馬髙蓋以豫待其子若孫之興其後果為丞相為御史大夫封侯尚主纍世不絶若持契券而責逋負人之言信歟否歟豫自筮仕以來十年之間見拜大司冦者凡三人而我俯菴先生最後前二公豫不敢名之特其執法之堅持身之謹尚能記其倣佛其後皆不甚顯君子不能無遺憾也先生寬平仁恕深得罪疑惟輕之意獄有要囚日夜為求生道不得則垂涕遣之由是罹文法者雖死亦自以為不寃其賢于定國逺矣以隂德論之于公之及一郡與先生之及天下孰多而孰少哉今先生諸子皆卓然成立而仲子輔之為南京刑部郎中焯有政聲駸駸乎又將世其官矣豫于是益惡夫羣吠臯陶者且服于公之能取必于天喜獄之可以生人也蓋天之于人譬人植草木畜禽鳥然顛者扶之病者飼之其心固且日望其生且長也愚民無知而遽致之死地是豈天之意哉故好生者謂之順天好殺者謂之逆天順天者昌逆天者亡其道彰彰明也考古者之所聞驗今兹之所見曷常失十一于千百乎輔之賀正來京師因省先生于官邸其竣事而歸凡同鄉而同朝者咸賦一詩以贈而豫獨為此言望輔之不獨世先生之官而又將世其德抑亦解世之譊譊者也送無錫大尹姜君某序無錫江南大邑也其地廣衍而多沃其民淳其俗富而好禮地廣衍則所産繁而沃則其産也恆裕而美民淳則訟不煩富則租稅易出而好禮則易使也夫臨易使之民理易出之賦聽不煩之訟而又居丞簿尉羣吏之上以制百里民物之命是邑雖大亦何難治之有哉故凡為令于兹賢而遷秩者多矣然而不賢者亦不敢謂全無其人卒未聞有以罪去者是非令䏻自勉也民不上聞而上無由以聞欲去之而不可得也雖然物議之在下嚴于公法之在上百年之為令者某也剛某也懦某也介某也貪某也公而明某也私而暗匪獨縉紳能言之雖坐㕓市耕畎畝執工役者皆䏻厯道其詳至于暗室屋漏之事亦一一指畫若嘗從旁竊睨而得其顛末者甚則摘瑕釁為歌謡播傳人口後雖幸躋顯仕欲泯而終不可得是則不賢之令雖不以罪去而其可畏不有甚于得罪者哉易治其始而難保其終易治其外而難制其內江之南惟無錫為然吾固未嘗不為其為令者懼也姜君某以丙辰進士往治其邑主客錢君世恩翰林華君文光來徴贈言于豫豫與某有一日之雅故敢以所聞者為告某思其難不忽其易謹其始圖善其終又安知其善議者不從而歌咏之且碑以志之也傳曰心茍無瑕何恤乎無家况因是而有家乎某其勉之送烏程司訓吳君士元序同學吳君士元膺貢至京取教職得浙之烏程鄊之仕者或為之喜焉抑又有為之憂者喜者曰烏程浙邑也然自吾宜興陸踰蘭山過長興可信宿而至其水道則下烏溪出震澤由震澤入大錢大錢則烏程界也而風帆駛疾有不俟終日者矣凡天下之仕而近者有近于是者乎憂者曰自吾邑之烏程信近也而其俗則逺也吾聞其學校雖設而士之登堂者月不一至焉稽其名籍有矣至滿九載或尚有未行束修者焉月食粟三石伏臘之費無所於出室人交謫我戚戚也而徒曰近近亦何益乎豫曰嘻其所謂憂非吾之所憂其所謂喜亦非吾之所喜者君子之仕在行其道而已道茍行雖嶺海萬里之外簞食瓢飲吾心終日樂焉否則近在衽席而日享五鼎之奉固自有不能釋然於中者矣夫人之仕進天也道里之逺近命也餼廩之厚薄人也而其道之行與不行則在乎己也在天與命與人不可得而強而在已者獨不可得而致力乎是憂喜在士元又非豫之所敢知也况學校乃教化之所自出風俗之厚與薄其機正在此而不在彼士元忠信䔍厚素著于鄉今雖在卑位其亦得少試乎則所以教之者固自有道舊俗之薄又安知不變而從厚也哉故于其行書此以慰其戚戚且以望豫鄰邑之同歸于厚也送南昌司訓談君文瑞序南昌古洪都也其山川人物具見于三王所著滕王閣序記賦中茍不失之誇齊魯燕趙何以加焉誇不誇吾不可得而知昌黎公一代之文豪而惓惓以不得一寄目為憾則其言殆亦可信矣世之仕宦者孰不樂居此哉雖然官自簿尉丞以上各有司存固無有無事而閒居者刑獄期㑹簿書日迫乎吾前則山川雖勝或不得逰或逰而不得騖逺陵危探竒厯險以盡其地之勝謂之不逰可也人物雖賢或不得而接或接而不得朝居夕處上論下議以盡其人之才謂之不接亦可也兼之者其惟學校之官乎或謂學校以教人為職遊覽宴集非其所宜是蓋不知所以為教者也古之善教者莫如孔子是二者有害于教則舞雩之集東山之登孔子何取焉彼勞形役力于句讀㸃畫之間窮日而後已者乃童子之師之所事非所望于學校者况訓誨教導之暇嵗有餘日日有餘工又匪獨流連於二者之間乎是固人情之所樂而不可廢者也吾友談君文瑞以文學名場屋二十餘年屢試不偶竟以明經拜南昌司訓外雖笑語欣欣察其中實有不釋然者故于其行為語可樂者以慰之送廬州太守馬君考績還任序少宗伯紫巖馬先生之冢子曰汝礪甫守廬之三年報政于朝便道拜先生于南都其歸也儀部郎中向君致先生之意徴贈言于豫且示以石城少宗伯李公石齊大學士楊公之文豫受而讀之凡西蜀人才之所由盛馬氏門户之所由起衣冠簮組之所由傳襲父子兄弟南北之所由㑹聚與夫汝礪治郡之績部使者薦疏之繁皆已備而無遺矣豫復何言汝礪廬守也豫請以廬人之為守者為汝礪語之班固西漢書所載循吏止于六人而廬人居其二朱邑文翁是已邑之治北海去汝礪所居尚逺姑置勿論文翁所治之蜀則汝礪父母之邦也昔之蜀非今之蜀猶有洪荒朴魯之風焉文翁不敢以蜀視蜀而以齊魯視之日夜以興學校為事民風丕變卒之禮教興而人才盛視齊魯有加焉文翁之化也自漢至今蜀之人莫不思之而况吾汝礪乎廬在先秦已屬內地人知事詩書今在王畿千里之內為天子股肱郡涵濡王化百四十年其視蜀之在漢固有間矣廬之人才世固不乏而今日之禮教視昔有加乎汝礪自視與文翁之治蜀何如其庶幾乎吾不可得而知也其尚有歉乎吾亦不可得而知也所可知者古今人不相逺而今之治廬比昔之治蜀尤易耳古者鄉先生殁則祭于社若文翁者必祭于社者也汝礪嵗時進而拜之尚思所以匹休而無使其顓美于有漢也哉豫忝交汝礪父子間而先生待豫尤厚故于汝礪之行不敢以今人相勉而以古之人為期其亦先生之意云太保康敏白公挽詩序挽詩何自而起乎說者謂吳伐齊公孫夏將戰命其徒歌虞殯此其始也以豫觀之夏之志在敵愾故令人先為是歌示若送死然非所以為挽也或云田橫死門人畏漢不敢哭乃作蒿里薤露之歌其說近是然亦不能無疑焉橫之歸漢惟二客從橫既死二客皆自刎是可謂慷慨以殺身者敢死而不敢哭乎使誠畏漢則歌與哭何異意者漢吏感橫之義隨柩叙哀後世相承為挽歌耳是則凡所以挽之者皆傷之也非擯棄流落窮困無聊之人則無以發哀痛慘戚之詞若夫公卿大夫道行志得亦何用挽為哉豫于是蓋有說焉道雖行矣而或未究其用志雖得矣而或未竟其施天下之人聞而傷之挽之可也又其上者功業塞天地德澤被生民後世思其人而不可見雖由今挽古亦可也吾郡白康敏公自給舍十一遷而至宫保其所建白于上而敷布于下者不可勝計天下隂受其賜人惡得而知之至于慮囚省刑降寇賑饑殺河流通餉道其功赫然在人耳目有不可泯百世之下人猶思之而况今日之熟于見聞者乎詩自魏國徐公而下凡若干莫非傷之也思公而不見不待百年而作者也送大司徒東園先生致仕詩叙富貴功名外物也自其不得者而觀之未有不以得之為榮而致之為甚難者自其得者而觀之則亦未見其榮與難也然古人有衣錦夜行之說行百里者半九十之喻豈冨貴未足為榮必冨貴而歸故鄉者斯為至榮功名非有所難必功名而全晚節者斯為至難歟東園先生自翰林檢討五遷而至少司徒數年之間乞身求去疏凡十餘上皇上念其舊學宿德每賜溫詔以留之最後辭益切始得俞㫖進秩大司徒給驛以歸世之所謂至榮至難者先生已兼之矣諸卿大夫無不喜而為先生賀而某獨有憾焉何也君子之進退以道為重而世之所重者君子有弗重焉先生為檢討未久即以疾告歸讀書屏山之下二十三年而後起此其志豈在功名富貴者哉其積之也久宜其發之也大其守之也固宜其行之也力先生為他官某不暇盡知自浙江按察副使入為國子祭酒時某在翰林見先生日以周孔之道訓胄子嚴立條教月有課而嵗有程意師道自兹而立未幾改官南都某亦無由詰其所以然者後若千年某來南每侍几杖輒見賦詩飲酒為樂若無所事事私竊怪之今嵗春夏間司徒王公以疾在告先生掌部事者三四月奏减冗食嵗省國儲二十餘萬其所設施于是亦可槩見矣使為司成而假以嵗月司國計而不為人撓得専政焉則其見諸事業者當不止于今之所見而已况坐而論道廟堂之上哉惜乎位不稱德而用之未盡其才耳此某之所以不能無憾也太宰泉山先生而下五人以瀛州舊好㑹餞玉亭之上用李太白天邉看緑水海上見青山二詩句為韻分題贈别其意亦若為先生喜者而某獨云云非敢以為異也非門生座主之私也蓋以見君子行道之難而所重不在外物也東園先生文集序有儒一生禮度甚間挾書一冊詒豫招鶴亭下置之几上再拜而請曰某東園先生之子也家君之文無慮數千百篇家君不自愛重稿多為人持去散而僅存此冊蓋千百之十一耳今將鋟梓願為序以永其傳豫曰文之傳也係乎人不係乎序先生之文豈待序而傳者哉且文之有序所以序作者之意也若某之愚䝉膚淺何足以窺先生之意而敢序其文乎辭不獲開卷讀之未竟數篇即斂袵而嘆曰先生之文甚類老泉某知之矣其氣昌其思深其詞正而不阿其辨博而不雜老泉而下莫之能及也既而自疑其言之妄以為老泉特西蜀一布衣耳晚年受薦得一官止于主簿而吾先生少掇髙科入翰林為法從歷官大司徒其出處顯晦不同若是而其文又無一句一字相襲者擬之得非其倫乎既而讀之既思之旬月乃釋然而悟曰是宜其同也某不妄也老泉少不好學年二十七始發憤讀書數年而後下筆為文吾先生初入翰林即歸卧屏山讀書二十餘年其養之也久故其志也慤其積之也厚故其發也遲其見之也真故其取也精聲實本末一無不同而何以顯晦疑為哉然而微有不同者老泉處韋布而所論皆朝廷之事先生服大僚而所作多山林之文其意有不可曉者豈所謂處江湖則憂其君在朝廷則憂其民易地皆然歟是固無害其為同也昔者老泉以文謁張益州益州許其似司馬子長又以謁歐陽文忠公文忠許其似荀子夫荀子古之大儒子長古之良史後世之所仰望而不可及者老泉以布衣謁名公卿得如是之稱不為卑矣而老泉當時當之不為深喜今某為先生門下士而妄稱先生之文類老泉烏䏻得先生之喜哉老泉曰樂道人之善而不為諂者以其人誠足以當之某樂道先生之善者也非為諂以求悅者也是故始終以老泉為言書諸簡末以授于某夀陳孺人八十詩序甲子某月日豫送客于石城之門之外暮而歸兒上有二刺焉視其姓字則侍御沈君公茂陸君如崑也其傍有幣焉問其所從來則二侍御之所委也問其何為者童子錯愕不能對翼日如崑以書至則徴文以夀克仁之祖母也豫聞克仁少失所恃而陳孺人鞠之茹苦而吐甘避濕以就燥無所不至是故稱號之際雖云祖孫而恩義之隆實踰母子今孺人見克仁冠豸服繡歸拜堂下其心不既樂矣乎昔者李令伯以舅奪母志而鞠于祖母劉氏泰始初詔徴令伯為太子洗馬令伯以祖母年髙不忍離左右遂不應命百世之下視其疏者莫不仰其風焉夷考其時劉氏之生正三國分爭之日避亂逃難依險負阻幾不䏻自存及天下甫定而其孫又為官司所迫其困苦無聊可謂極矣今孺人生長太平之世耳不聞金革戰爭之聲而其子若孫或處或仕閒暇從容甘滑滫瀡之養日有加焉其樂視劉氏何如哉夫人夀則宜樂樂則益夀二者常相須也以劉氏之困苦無聊而年幾百嵗則孺人之享年過于劉也灼灼然可知矣孺人眀年夀始八十其設帨之辰在八月某日去今尚逺克仁自謂繫官于外而其尊君鄉進士朝用又將校藝南宫弗克以時稱慶今兹奏事于朝便道過家欲先舉一觴為夀其同寅諸君咸為歌詩以祝之豫忝同鄉故序諸首簡且出二侍御之幣歸諸克仁併以獻于孺人送營繕正郎王君歸省序古者設官恆以職之繁簡為重輕非但為遷陟遲速之地亦以别才能之大小耳今之兩京一也說者謂南之視北為簡焉六部一也說者為工部視他部為簡焉工部之四司亦一也說者又謂諸司視營繕為繁而營繕若簡焉豈其然乎上自郊廟乘輿之禮物下至軍旅賓客之器用雖北之所成其材悉于南乎取之而南之宫殿祠宇庫廄倉廩關梁道路修之嵗無虛日不可謂無事也姑以所聞一事言之前七八年都城之北偏就圮朝廷命以時築計工慮用費財物以千萬計部不能給遂下配率之科于傍近州縣百姓騷然不寧怨讟頻興歷時踰嵗杵聲不絶比者東偏亦就圮而修之踰月工已告成民不知勞財用損前十七八其髙卑猶北也其丈尺猶北也其徒庸猶北也其效乃若是之不同者是孰使之然聊大司空㑹計總理之功固不可誣而營繕出稽入考條分縷析尤有助焉司空雖賢而營繕不得其人則綱舉而目不張猶為無益也以是而觀則南之營繕為繁乎簡乎輕乎重乎時俗之論不可據以為信昭然可見矣王君承德自丙辰進士厯升營繕正郎聲稱卓然一旦思逺去其親乞告歸省方君某馮君某徐君某以同寅之好反覆勸之不䏻止其行豈承德亦自以務簡而可去乎愛親之心勝不暇計其他耳聖朝以孝治天下凡京官之有親者例許六年歸省蓋不欲絶人之私也承德以例請上亦以例報可孰得而尼之雖然豫將有所告焉夫忠之與孝其名雖殊而其所以為道則一䏻忠而不能孝則其忠為未至能孝而不䏻忠則其孝為未純承德泝江歷險履雪踐氷不憚萬里之勞可謂不遺其親者矣不遺其親肯後其君乎方春至家問起居無恙外即回輈以就道親雖有離憂其心固樂也承德是行豈不一舉而兩得哉行有日其同寅三君來徴贈言于豫豫既筆其大者為言而又以往事告之非徒然也非敢彰前人之失也蓋欲君知斯職之重而來之速也送陕西參議賈君之任序陜西古秦也六國未一之初天下之謀臣智士日夜思仰關而攻秦西有戎夷窺間伺隙又未有長城之固秦四面禦之不聞有敗軍虜將之耻非善守而能然乎不徒守之之善而已穰侯武安王翦諸將軍無嵗不出戰今年攻晉明年攻楚又眀年攻燕攻趙士卒動以數萬計多或至六十萬以一國之民而興數十萬之師當時若有餘力以千里之地而供數十萬之師之費當時若有餘財敦本力穡之效大矣秦之無道固不足言而其富國强兵之術亦惡可得而少哉今西陜之地延袤幾三千里而民居相接我聖朝休養生息百四十年未嘗一日妄有所勞沃野之産斗粟不輸京師悉以實塞下為士卒費又嵗出府庫金帛以給之地視昔加辟矣民視昔加聚矣財視昔加多矣宜敵兵畏威逺遁不敢南牧而頻年佚入邊疆數百里內民之老弱者困于轉輸少壯者疲于戰伐報捷之音寂乎無聞尚可謂之善守乎哉問之州郡州郡則曰非我之責問之藩臬藩臬則曰非我之責是則任是責者誰歟食君之祿而欲専委罪于武辨難乎其免矣臬謂非其所守尚有可言藩自布政使而下皆守土之臣出治一道則謂之分守一障之不能安一民之不得其所不可謂之善守而况敵騎若是其充斥哉賈君天錫自户部郎中升陜西參議唐君某羅君某胡君某來徴贈言于豫豫謂君生長汾州去陜最近前聞陜之不善守而不扼腕嘆息非人情也今之陜即有一道之寄守禦之竒䇿素藴胸中者能又一施而不委之于人乎地非所守告之同官可也今世士大夫喜談唐虞耻論秦漢間事豫善秦之善守無乃非賈君之所欲聞乎君子之事君能致富强如秦而道德則比隆唐虞是亦無不可也豫同年邵君民愛倪君秀夫皆官于陜其亦以是語之送泉州太守包君之任序今之郡守古諸侯也成周之制大國不過百里雖周吕有大勳勞于天下當時封之齊魯未嘗敢踰其制而其受之也亦未嘗敢視為小其後魯地稍大孟子猶以為在所當損况其下者乎今之大郡延袤千里小者不下數百里其地視古亦已侈矣而為之守者恆若少之不知自視其功與周吕為孰優耶夫受人之地而視以為大則畏心生視以為小則怠心生畏則共共則慎慎則勤勤則凡可以養民者無所不至怠則忽忽則驕驕則淫淫則凡可以厲民者亦無所不至是故人之賢否政之得失固不待稽其終之所成而已判然于其初矣泉之為郡左吳右粵又濱于海隅號為閩之奧區自置守以來前後不知凡幾十百人多泯而無聞初孰不以為小而不足為乎惟其不足為而後不能有為而卒于無聞以是故也考之郡志以循良稱者得二人焉宋嘉祐治平之間有蔡君謨者為石梁三百丈以濟萬安之險又植松七百里以庇行道之人迹其行事當無一日之息至嘉定中西山真先生設方略以捕海冦去苛征以來畨舶下至閭閻之訟租賦之征罔不究心焉兹二人者敢視泉為小乎君謨以文學名西山之道德又為後世所景仰宜不屑于細政者而其所為若是蓋由于有畏心而然耳其功業之成豈徒然哉包君民敬由南京監察御史出守泉州恆若有不釋然者吾知其非以為小也其心蓋有所畏也畏于始而圖其終二公安能專美於宋乎等而上之則周吕亦可企而及矣豫辱交民敬頗久其兄民望御史又與豫有一日之雅而豫同年京兆李君時升又為之請於是乎書吳文蕭摘稿卷三
