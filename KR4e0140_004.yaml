body:
  text: 吳文肅摘稿巻四明吳儼撰序送廣東㕘議徐君之任序廣東古百粤地限隔五嶺之外三代以前不與中國通至秦漢始内屬為郡而猶背叛不常號為難治中州之仕宦者皆不欲往得則戚戚以悲至宋猶然自入皇朝版圖百四十年于兹涵濡列聖之仁化風俗為之丕變詩書禮讓視齊魯若有加焉豈惟其民之易治而已哉故仕者無不樂往有聞其風而慕之至有不得而以為戚者矣然去京師逺甚自昔為政者多順其俗不拘拘於法節目踈濶胥吏得以為奸而黑白易致於瞀亂非有明辯之才鮮不為其所欺地産白金丹砂水銀珠璣玳瑁鍾乳諸物可包可篚又賈舶一至則竒貨交集光耀眩人非有亷潔之操鮮不為其所惑山水之勝甲于天下竒花異卉徧被巖谷馨香四時不絶一縱遊觀則流連而不返非有勤敏之志鮮不為其所溺故能去是三者則聲名赫然振動一方倐起而服太僚比他藩為甚易觀扵昔之都憲楊公今之大司馬劉公可見矣孰謂脩扵嶺海萬里之外而名不聞扵天子殿陛之間哉南京工科給事中徐君希魯陞廣東右㕘議予同年户部郎中鄧君貢甫幸鄉人之將䝉其澤來徴贈言于子夫天下之事患在不能知知之而不能言猶不知也言之而不能行則亦與不言者等耳君為諌官前後䟽聞扵上者無慮數十中之所陳予雖不得而知至扵人之賢否某也明某也闇某也亷某也貪某也勤某也惰必嘗次第而别白之矣其言有不善乎前之所指為賢者今從而師之所指為不賢者今從而戒之其行有不善乎行既善則名譽自彰爵禄自崇入内廷而服大僚也有日予恐廣之人又不得乆䝉其澤也予與徐君同官南都知其為人足以為善又能受人之善言故因貢甫之請于是乎言送河南按察使僉事徐君之任序天下之地有難治者三而四夷不與焉一曰逺二曰險三曰曠逺則法令有所不及險則足以容姦曠則五方之民雜䖏而其俗龐三者有其一尚難扵治况兼而有之乎信陽古平氏縣也今雖𨽻河南而去其省甚逺又其地北接陳汝控帶許洛四方逃移而至者雖不占籍而可以居冥阨之塞在古所聞故南之盧鳯湖之黄襄椎埋剽竊之人藉為淵藪州郡之吏莫䏻誰何某邑之盗逃扵某州州則曰我民不為盗也某州之姦匿扵某邑邑則曰我民不為姦也追𨽻雖移以文而彼此不應以實獄訟歴數年而不䏻决則其治之也不亦難乎朝廷特設僉事一人以撫民而兼兵刑之任為是故也或謂天子有道守在四夷况信陽乎是盖不知為國之道者千丈之隄潰扵一蟻之穴非一蟻䏻潰之也其隙既開其終不可禦耳書曰有厥罪小乃不可不殺詩曰無縱詭隨以謹無良是豈好殺小罪而惡詭隨乎其防㣲杜漸不得不若是其嚴也故穿窬之盗不息則起而為剽刼剽刼之盗不息則起而攻城畧地矣是惡得而可忽哉大理寺正徐君成章陞河南僉事實治信陽其同寅鄒君某而下若干人來徴贈言扵予予謂信陽信難治矣徐君其可以為難而遂已乎夫畏其難而不敢為者懦也知其難而謂不足為者妄也懦與妄天下不可以治豈惟信陽茍及是時眀其政刑俾惡者有所畏而不為善者有所恃而不恐則千里之中環信陽而為郡邑者雞鳴狗吠四境相聞而逺者無害其為逺夜不閉户道不拾遺而險者無害其為險農工商賈各食其力而曠者亦無害其為曠矣向之所謂難治者今豈不易易哉予于徐君同官南都知其非懦與妄者而又重之以諸君之請故為之言送四川少㕘劉君之任序予至南都聞大夫士之賢者未嘗不識之心然而猶有未識者則僻居簡出之過也予友朱君升之戴君遜之毎為子道劉君景章之賢予心識之未暇識也間過少宗伯馬先生第景章在焉頎然其長温然其容予心賢之而又未暇與之論議也既而陞四川右㕘議過予言别與論古今人物得失成敗若指諸掌乃知昔之所見不足以窺中之所存而升之遜之之言猶有未盡者焉予益賢之因問蜀道所由景章曰有二焉其一溯江而上西之夏口又西之荆州又西之夷陵又西而入峡其道甚便然瞿塘灔澦之險古今所聞百丈逆牽而上進寸退尺不幸一失手則怒濤悍湍之中舟人無所致其力惟呌號神明以求濟而亦有不脱者焉雖便吾不䏻從也其一順江而下東北入扵淮由淮而之泗由泗而之汴至則舍舟從陸由陜入蜀天梯石棧架空凌壑仰而視之如出雲霄之上其道甚迂而其行甚艱然拑勒鞬􅀈可無車覆馬斃之虞吾將從焉予曰景章之愛其身也若是其至歟其知所以愛民矣夫牧民者之厲民皆不愛其身者也初豈有心以厲之哉求利其身耳貪利者日朘月削唯恐取之不竭貪名者刑嚴罰酷唯恐民之不勝始則厲其民終則害其身鮮有䏻保終吉者使愛其民如愛其身豈復有厲民者乎景章之愛身如此則其愛民也可占矣其賢于人豈不逺哉行有曰朱戴二君來徴言扵予因次第其語以為贈記新修寳坻城記寳坻在漢屬泉州在五代為塩倉金大定間始立為縣至我朝太宗文皇帝建都北京遂為畿内之地縣故有城其興廢多不可考入版圖百餘年四境乂安守土者不思重門擊柝之戒不復脩築今則漸復扵隍遺阯之存者無㡬矣武進莊君誠之以丙辰進士出宰是邑顧瞻咨嗟即欲有所為而猶恐民以為厲己未暇也既二年政成民和乃以白扵巡撫都憲洪公公曰事在畿内且去邊境不逺保障之計視他邑誠有不可緩者顧惟財用將安出乎爾其母病小民母耗公帑惟其富且義者圖之誠之承命惟謹乃募民出粟補官民皆懽然聴命而貴戚大族寓扵邑者亦皆為之助焉扵是經始扵𢎞治庚申三月甫朞而工畢城髙二丈有六尺厚視其髙廣四尺長一千二十八丈城外有池池深二丈廣倍之而加其一焉四面各有門門覆以樓東之門曰海濱其樓曰觀瀾西之門曰望都其樓曰拱恩南之門曰廣川其樓曰迎薫北之門曰渠陽其樓曰威逺門言其所嚮而樓則因其門也又為水關二北曰開源南曰節流北志其所入南則志其所出也又為角樓四左之前曰環碧後曰挹青右之前曰慶豐後曰樂治左指其所瞰而右則期其所成也合而名之曰拱都城盖取其宻邇皇都也天下之城孰不拱乎皇都者而是邑乃擅其名猶之水也朝宗扵海天下所同也而禹貢獨曰江漢朝宗扵海豈江漢之水獨異扵天下之水哉是固可以覘都憲公與君之所存矣夫天下之事人之有猷有為者亦皆足以任之顧其心私而不公則視所臨莅徃往若傳舍然如此城者未始不堅向使一石泐從而易之一雉崩從而築之雖至今存可也誠之舉百年之廢墜扵朞月之間而又戾不及民雖其才有過人者而為國之公亦惡可誣乎然㣲都憲公能用誠之則誠之雖欲自用以成斯役亦不可得矣書曰爾身在外乃心罔不在王室公實有焉儒學教諭齊濟周以書來請記扵是乎書執法兩京記南都大司冦浮梁戴先生前為御史時提學江南既而歴藩臬長貳居陜浙閩若干年遷副都御史撫鄖陽又若干年入朝為少司㓂時江南之弟子前後登仕版者㡬百人日造先生之盧請益焉既退則人自以為有得惟恐先生之去未㡬果以諸大夫薦陞今官通政司㕘議王君漢英致羣弟子之意扵儼曰自先生之為少司冦也日孳孳與司冦公講律令分别毫釐意惟三尺是持僚屬有輕平者或欲活死罪而傅生議先生則曰法在是是不可出有刻深者或欲詆輕刑而予死比先生則曰法在是是不可入自下户羸弱以至貴戚近臣有犯惟問法云何雖宗室亦以法奏讞不敢下上其手即史所稱何以加焉今之南都南都之獄雖未有所决平然即此可以占彼况彼之所校者視此加殺焉從而出入者又殺焉從而撓之者又殺焉而繩墨縱操又惟先生是専則執之之難易有不待言而知者先生豈以彼此易其心哉予在弟子中辱先生知最深宜有記以為先生頌儼曰記非古也三代以前未之聞也後世禮有記以載儀文樂有記以載音容城隍渠堰宫室樓觀之成莫不有記以載嵗月亦末矣先生恵澤在生民功業在朝廷公議在縉紳大夫士何藉此一記為哉雖然記者所以識不忘也古之人為善為惡萬有不同茍無史以識之則萬世之下孰得而知者記出一時史傳萬世安知一時之言不為萬世張本乎今先生執法若是而儼厠史官之末因所聞而書之是固儼之職也亦羣弟子屬儼之意也予莊記予莊去城南僅十五里舟行道迂則倍之其地背山而面流田遶四周饁餉者不出百歩僻幽而靚深最宜隠者居然山卑而樵牧不輟其上常濯濯水清且寒無大魚土磽瘠不甚冝稼穡力勤而收薄冨人多不欲之棄而不售者數十年矣予始得之陳氏問其所以名曰其地宜榆昔有古榆數株今不存矣或曰勝國時有俞氏居之故名予曰安知非天之遺予者乎夫天下之物茍非其有終身望之而不可得是莊也隠者不得居富者不欲居售之數十年而卒歸于予他日菟裘之計將扵是乎托焉是天之所以遺予者無疑也宜名曰予莊凡溪山泉石澗壑田野徑路橋梁臺榭悉從而予之昔者栁子厚居冉溪之傍汚以惡名曰愚溪元次山愛祁陽之水據而獨得曰浯溪易號而改稱嘵嘵焉曲為詞説當時土著之民聞之口雖不能言安知其心不有忿且怨之者乎予之名莊意雖有在而名仍其舊居傍之民樸魯多不識字義聞之必不甚駭他日謝政而歸予知執耒耜者喜而從予耕執網罟者喜而從予漁執斧斤者喜而從予薪與夫時節伏臘祭享宴㑹笑語謳歌者皆喜而惟予之從求其忿予怨予者必鮮矣是則莊之名予也不賢扵愚與浯乎或曰自有是莊以來地未始改也而地之主屢易知而可數者數人而不知者不可以縷數也百世之後安知斯名之不改歟予曰子何不達之甚也栁子之愚元子之浯一旦易萬古之名而猶不可改今予仍舊而名不加惡且與鄉人共之孰為而改之哉若夫土地溪山之所有予尚不敢保而况予子孫乎人得之而人予之是莊固猶予也遂為之記墓誌表狀碑衢州府知府蔡公墓誌銘公諱敞字士𢎞别號毅齋其先蘇之崑山人國初大父子真以金工𨽻内府徙籍應天太宗皇帝遷都北京遂居宛平子真生禧禧生公公㓜孤貧力學充順天府學弟子員貢入太學成化改元修英宗實録擇善楷書者公在選中實録成授中書舍人秩滿陞工部都水司主事承部檄浚漕河疏隍渠事事皆有法楊村獨流地産萑葦民分占為業而官税其十之三後漸為世家所據民失業而税如故公為疏請還之雖諠謗不恤進營繕員外郎脩築京通二倉先是法司送徒供役徒多亡因取直募傭其貧不能出直與逺不及輸者悉繫扵獄徃徃瘐死公白於上官寛其禁貧甚者則以十人為一火火設一人守之朝出作暮而歸徒得不死亦不亡用是有能官聲陞衢州知府在衢惠政尤多遇大旱公齋沐禱於土神為文自責雨尋降公循行被災之邑發粟賑窮乏且為白藩省免田租時中官守浙者索供奉禽鳥花木於郡邑公辭以民飢且亡所於取中官素賢公遂不復責𢎞治初考察天下百官臧否御史以公舉止迂緩意其慢已遂以衷老黜公公治装將歸時有訴不平於上者首舉公為言上命侍郎彭公韶覈之復留公公自念為後進所侮又耻扵變情徇勢遂固求致仕得俞㫖即日浩然去郡公性友愛二兄繼殁事長嫂姚甚謹事必諮而後行仲兄遺二子皆㓜公長育之教誨如己子人至不䏻識其為姪焉公少嘗遇異人傳秘術醫藥卜筮皆有竒驗謝事後閉門不出然或有疾就醫及持龜繇問吉㓙者未嘗拒之盖不欲以老與貴變其初公卒之先二日其子將有所適公止之曰爾無行吾將行矣及期端坐而逝人或以為公盖有所得云公生扵洪熈元年十一月二十二日卒於𢎞治十三年八月二十三日夀七十六嵗配朱氏有賢行子二人長曰桂芳禮部鑄印局儒士先公卒次曰玊美卜以九月二十二日塟公扵都城東八里莊新阡以桂芳祔玉美先事持代府教授仇東之狀來乞銘銘曰矯矯蔡公行不茍同匪曰立異惟義之從一為刺史視民如子匪民是私惟職如是致政而歸一室是依豈公好獨世與公違公富且夀實天之祐亦豈私公惟徳之茂峨峨新阡既固既堅無毁無傷百千萬年梅軒處士任公墓誌銘梅軒處士以𢎞治六年某月某日卒扵家其子泥扵隂陽忌禁之説八年而後克塟塟有日以狀來乞銘按狀任氏宜興故族曽祖諱某祖諱某父諱某世以孝弟力田聞處士繼承弗怠父嘗有危疾醫不䏻療處士沐浴一室中夜四鼓起拜北斗下且泣且呼求以身代因刲股為粥糜以進父疾尋愈而家人無知者既而創巨痛深㡬扵斃妻子始知之猶戒勿言後寖聞扵鄉鄉老欲言有司旌其門閭處士曰吾無是縱有之亦何足以聞遂止邑嘗有䏻令繩下太急姦民誣以贓賄事連處士或勸其舁疾徃冀得自脱處士毅然曰若然誰為吾令雪其誣者遂就逮反復證辯御史怒不即承搒掠甚慘肢體無完膚終不改易一言御史悟事乃得白令徳處士思有以報之而處士終不徃見人以是益賢處士處士諱某字某生扵某年月日距卒得夀若干嵗娶某氏繼娶某氏子男五人長曰某處士歿後五年而卒次曰某曰某曰某早卒曰某實予壻女一人適某人處士美丰姿髯長尺餘望之如神仙中人與人談笑風流醖藉無貴賤皆得其歡心家産素饒嵗入以百千計而處士周貧恤匱且好延賓客人有求無弗應者以是卒之日無餘財焉處士善行可述者尚多然行莫大扵忠孝而人之所以重處士者亦在扵是予故以是銘銘曰吾親兮可生吾生兮可輕吾不恤乎殘形而又奚心扵近名事官長兮如父如兄父兄含寃兮吾子弟其何以寜雖一日少辱兮而終身則有餘榮身屢斃而不斃盖有䕶扵冥冥鳴呼忠孝之道通於神明鄉有若人吾當作銘明故廣西左㕘政致仕周公合塟墓誌銘公諱源字本清别號直齋周氏為武昌著姓其先有諱夀者仕元為翰林直學士曽祖諱仲彰隠居不仕祖諱縉永清典史太宗文皇帝靖難兵起永清公佩印南奔將他圖事泄械送京師上義之貸其死謫戍興州父諱瓛以公貴封監察御史沒贈知府母邵氏繼母張氏俱贈恭人公少莊重喜讀書弱冠逰邑庠益親師友勤學問遂有聲塲屋中景泰元年湖廣鄉試卒業太學拜山東道監察御史恒以别白邪正為心毎言小人過雖小當遏其㣲君子不幸而有詿誤不可以不拯捄議者謂識大體未㡬奉勅清理河南軍政時姦弊多吏不能革有養乞兒補籍伍指同名以覬免役者公悉為正之成化丙戌巡按貴州舉亷黜貪有大吏為劾去卒無怨言金竹安撫司安撫金澄為叔鐸所鴆其繼母王氏發之鐸遂誣王與澄亂且云有娠王不勝拷掠竟誣服禁踰年無驗公至為直其寃乃寘鐸扵法丁亥丁外艱服闋上命公賑濟大興等縣所活民以萬計招撫流亡三千餘家適揚州守缺吏部以揚南北要衝苦役繁且值嵗飢民不能堪遂奏公補之公規畫有方供費不缺而民不知勞時有鹽商曹隆買妾楊氏楊擕韓氏児祥依隆居祥長誘隆子玘至野外殺之因誣其仇張浚潜入城濠洗血匿刀水中邏者縛以見公祥以刀未獲不即承公臨濠上忽有飛鷹堕水中公曰刀在是矣令人沒水取之祥遂引服興化有婦人張氏殺其夫朱普普家不知其鄰周坦知之婦遂訟坦殺夫繫數年不决公得其狀出坦公在揚所斷疑獄如此類者甚衆不能一一記也丁酉以内艱去位服闋改臨江府臨江民好訟株連蔓引動千百人比揚尤號難治公聴决如流獄無滯囚甲辰陞廣西左㕘政分守栁州栁之都指揮王英暴且貪士卒不勝擾譁而出城㡬欲為變公聞之急馳至諭以禍福遣歸營且劾英罪卒乃聴命丙午公年滿七十謝政歸鄉里日與故舊飲酒哦詩為樂有語州郡短長者輙不應𢎞治癸亥二月八日以疾卒扵家春秋八十有七夫人嚴氏勤儉孝慈徳足以配公先公八年卒塟扵洪鄉蓮華山之原子男一人曰佐上林苑蕃育署丞娶王氏女二人長適劉淵次適錢奎孫男四人曰楷模楫柷楷楫皆邑庠生楷尤敏而有文孫女一人聘王庭梅曽孫男三人曰時舉時雍時登曾孫女二人公平居謹厚退然若不䏻言及居官臨事則精明果斷吏不能欺勢不能屈而其要卒歸扵仁厚與人交一以至誠未嘗為逰詞偽色雖奴𨽻之賤與其語惟恐傷之故見之者皆怡然無不滿之色卒之日聞者莫不流涕焉嗚呼公可謂鉅人長者矣今佐以卒之年某月某日啟嚴夫人之封奉合塟遣楷以狀來乞銘予與佐少同筆硯予友王君廷輔其表姪也又數數為予道公之詳予雖不獲拜公不可謂不知公者乃為之銘銘曰允矣周公豈弟君子一物之傷實公所恥公為御史淑慝是甄匪徒癉惡以保善人守郡佐藩循良益著疲氓既安要囚斯録待人以恕處已則方為民作則為吏立防天錫公禄復假公夀豈公是私惟徳之茂民懐公恵復畏公威豈公有求惟徳之歸蓮華其原洪道其鄉萬世之澤刻銘同藏明故陽城訓導田公墓誌銘陽城訓導致仕田公卒扵家其子南京監察御史登聞訃哀號擗踊不能勝既又念其墓無埋文無以垂諸永乆揮涕掩泣自為事狀介予同年友刑部郎中劉景祥員外郎馮秀夫來乞銘于予按狀公諱銘字克善號警齋其先平陽洪洞人元季兵起曽祖仲寛年方髫齓隨鄉人避亂兖之武城為荘氏贅婿因占籍焉仲寛有子四人其長曰某某生剛早卒卒後六月而公始生大母蔡母韓憐之撫視甚至一舉動惟恐其或勞公自以㓜孤思自樹立讀書嗜學不煩程督稍長補邑庠弟子員屢試塲屋不利有司成化甲辰膺貢入京授陽城訓導及登登甲科拜縣令駸駸顯榮遂絶意仕進乞歸郷里公之初至陽城也學政弛廢士習日趨扵簡陋公嚴立條教日夜訓勵不怠諸生初以為煩既而翕然嚮服更相語曰是賢師扵我有益何忍背邪有弗率教者衆共責之扵是士習為之丕變及其歸諸生依依不忍别載酒殽餞數十里外臨去有泣下者嗚呼此豈可以聲音笑貌為哉公教人以誠内外一致而又能以身先之其所感者深矣登為縣令數致書戒以居官守身之法及為御史便道拜公扵家公曰是官職難盡古有所謂天子御史其庶㡬乎爾能不負朝廷斯不負所生登受教南來月餘而公之訃至實𢎞治甲子四月八日也公生扵正統庚申某月日距卒享年六十有五娶陳氏子男七人長即登次耘義官次佃次里次界次畸邑庠生次畛女二人俱適同里名家今卜以某年月日塟扵武城之城北從先兆也田之姓始扵陳公子完避難如齊以陳為田或云食采扵田子孫因以為氏傳九世至和遂受命為齊侯後秦滅齊田氏散處其國不去漢興徙諸田于長陵故田氏在長安為多自漢至宋上下千四百年代有顯人不知何時始徙平陽平陽去長安不甚逺今又自平陽徙兖兖魯地也齊魯境接豈田氏子孫不忘其本而天亦有以相之歟銘曰田室于姜鳯鳴鏘鏘横惟死義不侯以王一言取相富民之長卓哉𢎞正籍土歸唐錫居諌議直名斯揚髙風凜凛後先相望有元不顯惡彼冠裳甘貧與賤吾道奚傷自晉徂魯啟居不遑豈敢徼福以邇舊疆惟公克立扵前有光天啟諸田後世其昌公侯復始惟數之常有如不信視此銘章勿齋先生墓表先生姓林氏諱智字若愚别號勿齋裔出唐邵州刺史藴之後世居莆田曽祖崇祖寳父徳如皆隠居不仕先生生二年母陳氏殁又五年徳如翁亦殁繼母鄭氏憐而撫之甚慈少長出從里儒受尚書習舉子業尋補縣學生正統甲子中福建鄉試戊辰中㑹試乙榜授宜興訓導至則嚴立條教課諸生以讀書作文之法俾各有所依循昧爽具衣冠張燭坐堂上琅琅誦詩書比諸生已乃取古法書臨摸之至數百字手倦則復誦讀如其初諸生始以為倡導適然耳既而日以為常雖寒暑風雨不少弛懈人人飭礪以率教為榮以違教為辱士習一變先生身教然也秩滿陞銅梁教諭未㡬丁繼母憂除服復除宜興宜興前所徳先生之教者喜出望外益踴躍卒業至名不係學籍亦願就學者常數十人先生亦納教之俾同諸生講説名聲藉甚提學御史陳公選舉先生自代吏部雖不能用猶以是故扵先生謁選之日擬陞縣令先生聞而謂人曰當道宜用人所長某將老矣安䏻舍詩書而事簿書哉倘未欲棄某以校官終身足矣崑山葉文莊公時為吏部侍郎遂授先生蘇州府學教授先生至蘇學其學與斆無異宜興時九載如一日諸生始若不䏻堪乆而服其教化及其致仕而去猶追思之先生前後為校官二十七年皆在江南而四方縉紳多聞之故毎當大比之年藩省爭先禮聘焉先生嘗考浙江者一考江西者再以疾以老辭而不赴者猶多浙江江西所取多知名士故尤號有識鑒云先生性至孝常痛父母蚤世毎春秋時節祭祀嗚咽流涕者竟日祖廟故卑隘撤而新之加宏敞焉且増祀田若干畆婦翁趙立歿而無嗣先生為之經紀其喪得不暴露甥陳元㓜孤先生携之官教育之與羣児等既長復為之娶婦乃遣之歸其他周貧賑乏重信義事多類此此其著者耳生宣徳丁酉六月十日以𢎞治甲寅正月五日卒享年七十有八今以某年某月某日塟扵某原娶某氏子男八人曰峦岳岊嶅仚宻岫崑峦早卒岳隂陽正術宻岫崑皆郡學生女二人長適朱謙次適王仕器孫男女二十七人曽孫四人嗚呼先生之徳之學莆人知之蘇人知之予宜興之人知之豈待表而後見然天下不可以莆與蘇與宜興槩也而䏻盡知乎况𢾗世之下又有可傳者哉是固門下之士所共憫而憂者某在門下受教為最先故為之表而不䏻讓焉南京兵部車駕丁郎中墓表𢎞治癸丒六月南京兵部車駕郎中六安丁公移疾還家舟至桃城鎮而卒時八月一日也其子磢等奉喪歸塟乃持監察御史姚維祺事狀詣予拜且泣曰先子之藏少宗伯紫巖馬先生幸賜之銘而墓碣未刻不肖孤敢布其哀懇丙午鄉薦先子實忝從先生後有同年之雅今日先子之殁先生其忍不賜一言以寵綏先子扵地下乎予義不獲辭遂諾之按狀公諱佩字大用姓丁氏世居蘇之長洲大父興始徙六安興生文號朴菴家溶溪貲産日裕以公貴封南京刑部主事朴菴生公公少頴敏數嵗即知趨學日誦數千言及長博涉羣書為文下筆立就一時諸老先生皆自以為不及成化間今都察院左都御史浮梁戴公為御史提學南畿號知人既歴試江南北十三府之士最其䏻者十人榜扵通衢以勵諸士子後十人者皆相繼登甲科公其一也𢎞治庚戌公中狀元錢福榜進士拜刑部山東司主事丙辰丁父憂服除改兵部武庫司陞武選員外郎尋陞車駕郎中所至皆克舉職公在刑部聴斷精詳不専事鞭箠囚有乆繫扵獄者更數司問不决尚書改命公公一言决之尚書以為䏻由是凡調問者必屬公羣囚亦願聴扵公時有同産兄弟訟産公諭之曰汝年㡬何曰㡬六十矣曰有子乎曰無曰欲誰遺乎古人謂難得者兄弟今汝以垂老之年争産以遺他人而傷骨肉乎兄弟皆感泣求去其在車駕凡驛傳廐牧之政處之各有條理雖權貴人例外欲起一舟一騎皆不可得可得者其人雖賤㣲即與之不靳亦不過為矯激以千名凡六部諸司事多决扵郎中惟刑部員外郎以下各得分理故公在車駕武選事不多見然當時大司馬青谿倪公御下如束濕一時僚屬見之恒惴惴而退不䏻盡所欲言惟公白事不直不已倪始知禮重凡事必任公其才扵是亦可見矣公居官事暇輙讀書手未嘗釋巻雖病亦然所著有養浩遺稿藏扵家又善啟廸後進門下成名者甚衆若進士潘鏜髙江皆髙第弟子也配某氏封安人先公九年卒子男三人曰磢曰礦曰碔女一人尚㓜孫男三人曰鈇曰鉞曰銏公生扵正統丁夘距卒享年五十有七塟以卒之年十一月七日墓在城東連城坂之原嗚呼公之才無所施而不可大而公卿次而牧伯皆優為之而年不及中夀官止扵五品卒不得究其所施可勝惜哉然世之人有居髙位而不䏻有所建立死之日無得而稱焉又有豪傑之士沉匿下位或老死不霑一命雖有所藴而無所施則亦終扵無聞今公居刑部而羣囚願聴扵公居兵部而權貴不能屈且為長上所禮重此宜有以表見扵世也予特書之以慰其子之心并以昭示其鄉人云故光禄大夫柱國少師兼太子太師吏部尚書華盖殿大學士贈特進左柱國太師諡文靖徐公行狀公諱溥字時用姓徐氏别號謙齋常之宜興人世有隠徳曽祖福當元季兵亂扵所居溪上為長筏夜以濟避亂者人多徳之祖鑑瓊州太守䏻不鄙夷其民有恵政民為立祠以祀父漁隠先生孝義尤著鄉人稱為厚徳長者事具彭文憲公所著墓誌公其冢子也為児時已卓然成人羣児在側不敢為䙝語嬉戯少長從里師㳺嘗取經典法言為一册題曰聖賢要語藏夾袋中以自警里師疑為玩具逼而觀之乃大驚因辭於漁隠先生曰吾不能為令子師矣一日舅氏從外來稱他子弟善歌以詫公公曰歌曲䏻顯親揚名乎若某所願則異於是景泰庚午以書經中應天鄉試㑹試下第益肆力扵學至忘寢食寒暑遂成痞疾漁隠先生憂之與同卧起公猶暗誦舊習不輟甲戌中進士第二名授翰林院編修以舊疾作謁告歸天順丁丒英廟復辟選東宫僚屬公兼司經局校書甲申憲宗登極陞左春坊左庶子兼翰林院侍講充經筵講官預修英廟實録丁亥清武職誥黄辛夘丁外艱特遣官賜祭服闋陞詹事府少詹事兼侍講學士乙未典禮部㑹試丁酉丁内艱賜白金㨋幣及祭塟服闋陞太常卿兼翰林院學士辛丑再典㑹試陞禮部左侍郎甲辰上以山陜旱荒遣祀中鎮西海河瀆諸神公奉事惟謹所至雨輙應丙午改吏部甄别人物賢否以佐銓政一時人咸服其公明憲廟末年東宫舊臣多為卿相雖䝉上眷而為當道所忌獨未大拜今上即位始與洛陽劉公同日入内閣陞禮部尚書文淵閣大學士輿論翕然𢎞治庚戌復典㑹試辛亥憲廟實録成公以總裁官陞太子太傅户部尚書武英殿大學士賜白金文綺襲衣廐馬甲寅陞少傅吏部尚書謹身殿大學士丁巳公以年滿七十乞致仕上固留公仍令風雨大寒暑免朝戊午陞光祿大夫柱國少師兼太子太師華盖殿大學士未㡬以目疾求去上以公累朝舊徳方隆倚任屢詔慰留遣醫診視中使賜羊酒米菜諸物最後辭益懇切乃得俞㫖賜勅給驛又賜襲衣白金寳鈔仍遣官䕶送以歸令有司月給米五石嵗撥輿𨽻八人官其一孫為中書舍人又一年薨于正寢實𢎞治十二年九月十一日也夀七十二訃聞上感悼不已輟視朝一日贈特進左柱國太師諡文靖遣行人諭祭者九命有司營塟事恩禮有加焉公娶杜氏繼李氏俱贈一品夫人子男四人長曰元楷遇例為浙江都指揮同知次曰元栻次曰元相承事郎次曰元槩中書舍人元栻元槩俱早卒女一人適通政司知事張邦祥孫男八人長文煥中書舍人次文燦文熺文烱文燁文煇餘未名女五人曽孫男一人公徳性凝重度量宏逺自少負公輔之望在内閣十年餘以仁厚養國體以名節勵士風匡救將順恒以正君徳為先其所謀議必欲慎守成法或勸其有所建白公曰國家法度皆我祖宗神謀廟筭其所以恵元元者甚備患在不能守耳豈宜更張今上初即位止貢獻罷工役黜異端屏憸邪登用老成一時善政傾動天下耳目雖出宸衷獨斷而公贊相弼成之功居多時有大臣罷廢家居者夤縁謀復起公力持其議不得行占城奏安南侵小乞命官徃問罪公亟䟽止之至扵薦㧞人才常若不及一善一䏻無所遺棄或有過誤曲為掩䕶惟恐不為完人嘗曰天之生才甚難以㣲瑕而遽棄之吾不忍也其進退黜陟惟視輿論為權度不以親踈逺近貳其心以故終始完節人無間言公前後三主禮闈所得多天下名士公未去位時已多躋顯位餘姚謝公則與公同陞内閣矣其在經筵毎遇古先治亂興衰之事敷陳眀達而又進止從容悉中矩度以故上多嘉納焉公居家孝友事親䏻養志杜夫人父老且貧公製一衣進漁隠先生請自以意遺之其不敢自専如此聞漁隠先生有疾日夜涕泣以不得躬親湯藥為恨及卒哀毁過禮廬墓者三年其喪何夫人亦如之有白鳩白鴈之瑞人以為孝感所致公自奉薄甚厨饌隨所有具非祭祀賓客未嘗殺一牲至周䘏施予則不少靳惜故舊貧乏不振者經紀不啻已事尤好表章先賢邑人吳尚書友雲洪武初死事雲南事乆湮沒公致書守臣請賜贈諡祀享又裒集諸名公詩為忠節録以傳扵世初入官即分俸以贍族人及在内閣乃買腴田千畆為義莊又立條約為永乆計上嘉其義特命蠲其徭役公學問純正為文詞必根理道恥雕琢所著有謙齊稿若干巻藏扵家夫卿相之䏻否必徴扵世而後見公周慎謙抑對賓客子弟言未嘗及禁宻事故凡所以論議於上前者皆不得聞而儼之愚昧又不足以知公謹述人所共聞見者為狀不䏻詳也然即其世考之則君徳清明賢士滿朝百姓安樂四夷賓服公之勲業豈終不可得而見哉伏惟立言大君子採而擇焉易守戴君去思碑守令民之父母凡人扵父母未有逺去而不思者是則守令去而民思之亦情之所必至耳何足疑乎盖自三代以降民心之澆漓非一日矣守令又不䏻愛民如子徒以苛察相髙智欲示其難測威欲成其不撓甚者嚴刑酷罰視民如草菅故其民視之亦如鬼蜮惟恐去之不速尚何思之有乎茍既去之後而䏻致民之思則其化之入扵人者深矣是豈易得哉吾友戴君遜之由丙辰進士守易五年陞南京户部員外郎易之民思之不置茂山衛指揮王元振庠生某最其政績為書走數千里徴文以垂無極遜之聞而抑之逾年請益堅曰非此無以慰易人之思且托鴻臚丁君應韶助為之請予聞易在畿内西當兵衝最為繁劇他守日不暇給而遜之為之綽有餘力部使者交章薦之始下車即興學校凡殿廡齋舎泡湢為之一新買書數千巻其中政暇則與士子講義理縱民吏觀聴又為教十六條俾村社朝夕張施講説民心大悦𢎞治戊午己未連嵗旱五榖不登遜之以州有積粟萬餘石乃倣古常平之法减價以糶部使者下其法于所屬六府民得不飢死州治之南有河廣若干尺以受西北大寧窮獨諸山之水水暴至則泛溢四出壊禾稼民甚苦之遜之為築長堤七百餘丈以遏横流由是瀕河之田嵗無水患又旁郡有賊數十人入其境白晝剽刼遜之率義勇百餘徃與賊逆戰賊敗登髙以瓦石投人人莫敢近遜之命人持一炬負版造其下縱火焚之賊復下戰遂射殺其魁餘遞縳以降其大者如此其小者固可知也詩曰豈弟君子民之父母傳曰民之所好好之民之所惡惡之此之謂民之父母若遜之者非公好惡而䏻豈弟者歟今易民之思遜之是思其父母非思守也建亭立石昭示無極此易民事耳遜之豈䏻終抑之哉昔者東漢何武所居無赫赫名去後常見思范史紀之今遜之之政若是其著而去後又䏻致民之思是加武一等矣又何暇論世俗虐民之吏哉予故書之以勵後像贊祭文白秉徳小像贊此怡静學士先生釋褐時小像吴小仙偉之所貌也先生以成化甲辰進士及第至是已二十一年矣偉見先生扵二十年之後而欲追貌二十年之前之容不亦難乎然容貌嵗有不同而骨骼一定不易則偉之所貌亦得其髣髴矣夫偉䏻貌之而不能知予能知之而不䏻言曷為而不能言言之不工不足以取信後世猶不言也雖然其視畫史固有間矣昔者司馬遷贊留侯徴諸圖畫必以當時文字無傅也使予言若傳千嵗之後作史者其肯徒取徴於偉哉贊曰偉乎其容鵠停鸞峙卓乎其行凖趨繩履才之充也䇿萬言而不窮器之宏也魁多士而弗喜珠出蜯而韜光劒出匣而加砥英聲四馳天下傾耳道徳文章人悉謂有開其先公卿宰輔予則言兹惟其始是以不待論思北扉而已知為聖世之名臣不待紬書東觀而已識為今日之良史矣祭舅氏徐太師文靖公文成化己丒公歸省親我始拜公扵水之濱公曰我甥我弟之子汝䏻有成我弟不死予受公言夙夜不忘何時克立扵母有光後十七年予始登第釋褐之初公笑而喜公戯謂我汝欲何官煩簡大小擇汝所安我欲盡言懼拂公意再拜對公以伸予志宰相用人如匠擇木惟才是問不問所欲公喜謂我汝誠吾甥汝年尚少汝言老成既官翰林日侍公側以聆教誨以觀道徳𢎞治戊午公欲致仕三䟽乞歸始得俞㫖皇帝若曰是惟元臣歴事四朝始終一心今焉歸老道途千里保䕶維持孰可送爾乃命小臣護公東歸公既至家笑言嘻嘻我别公去實違杖屨未及七月乃聞公訃為位哭公我命之窮孰消我吝孰發我䝉斂不摩棺塟不執紼地阻職拘我心鬰鬰頼公餘休遷秩南來拜公之墓我心實哀感公之恩言不䏻道心公之心庶㡬可報尚饗吳文肅摘稿巻四
