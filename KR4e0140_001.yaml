body:
  text: 吳文肅摘稿卷一明吳儼撰五言古詩送髙舜穆宰瑞安嘗聞陶隱居燒丹白雲嶺所志在神仙不落死生境至今嶺邊人相傳事幽屏出門見縣吏退避匿形影君今往治之順俗須清靜勿求上官知而乃事威猛威猛民不堪舉目視前穽譬如汲淺井不煩用修綆又如煮小鮮不煩用牛鼎鼎大火易燔綆長勢難整清靜兩言中味之覺雋永題畫屏次國賢韻少年誦詩書心恆慕伊周蹉跎成老大白髮上我頭作羮不為梅濟川不為舟金馬石渠間強陪英俊逰去年歸故山幸得兩月留坐石聽啼鳥持杯發清謳豈敢肆雄辨萬物移春愁自從到京國仍懷杞人憂故山不能見畫中容可求長橋跨蛟溪青山繞四周聞君年少時扁舟泊溪頭臨深戒在心坐卧不出舟於今二十年乃復思追遊追遊不可得官職相牽留溪上採蓮曲山中採芝謳採芝貴及春採蓮貴及秋秋無蛟龍害春無虎豹憂二者不可兼問君欲何求譽竹勿謂吾竹瘦竹瘦形乃竒潛龍月下影老鶴風前姿雲丘有帝竹其種舜所遺一節可為船維楫將安施况我未眼見傳聞猶可疑何如此瘦竹真作俗士醫挺挺若骨立森森如直鰭萬古孰同節西山飢伯夷靈夀杖為羅進士父賦嘗聞靈夀杖似竹還非竹天然合尺度而自有節目漢庭賜孔光不稱三公服今歸羅隱君始脫泥塗辱暫曳過崆洞終携入盤谷扶顛與持危要不藉僮㒒赤藤苦不堅桃竹頗類俗草木若有知安能不羞縮但恐君力強棄置倚墻屋蛟螭見光怪雷電時相逐題陳明之畫桃蟠桃在海中去此幾萬里西橫一枝來纍纍生九子九在易之陽一乃數之始從一至百千其算猶未已陽雖有老少中各含生理祝夀更祈男畫意或如此湘水飛雲為徐廷用主事賦湘水有白雲飛飛無定止朝從水東生暮向水西起東西浩無涯要不離湘涘遊子在長安去湘八千里望雲雲不知吾寄吾思耳他山豈無雲吾親不在彼湘水豈不遙白雲長戀此朝暮望不休變化安可擬或薄如輕綃或積如結綺或碎如衣穿或亂如旗靡或如鳥翼張或如魚鱗比或如馬脫銜或如車就軌或如神仙人冠服盡竒詭或如禮法士辨冕而端委郁郁復紛紛千里猶尺咫髙山不礙目况乃隔城壘願言借長風吹我渡湘水長風軟無力不能移步跬願言隨飛鴻直入湘雲裏飛鴻有長翮我乃無短羽望之若可親即之又不邇何日得依雲不以望為喜我作飛雲篇聊以代陟屺贈浹姪家有二頃田負郭仍膏腴城有五畝宅繞屋皆桑榆客來一斗酒不則飯一盂僮奴足使令而不親樵蘇髙眠日晏起州縣無追呼試問舉族間盡有此樂無國賢示和陶止酒詩因次其韻吾飲苦不多不待戒而止止不在多言戒在方寸裏五斗可解酲古人紿妻子不飲固鮮歡劇飲亦何喜從容五七行客散主亦起飲與不飲間乃自有至理獨醒似絶人沈湎必傷已有德以將之庶幾其免矣糟丘本無山酒池焉有涘不醉不醒人寥寥百千祀國賢再和以止酒意出楊太常復用韻和陶復和陶止酒亦云止君不慕子雲胡為相表裏太常日日齋以禮拒妻子君不屬禮官胡為共悲喜紛紛止酒人暮止朝仍起不如吾少飲終亦無醉理文士多尚同達人惟任已趣舍既殊途發言斯異矣吾嘗夢醉鄉曠逺無涯涘世復杜康家不廢劉伶祀送凌志學君性巧過人乃自謂養拙豈惡人間世紛紛學姦譎行拙常欲方言拙常欲訥出門拙何為不學事干謁北窗日髙眠詩書自怡恱文格不隨時自笑肱三折朅來試校職就補贊皇缺但得祿代耕莫問官冷熱况此函丈間論議皆時哲春乘帳下風夜立門前雪豈無惡巧者為拙傳衣鉢竹居為子雨父賦結廬在深巷瀕水仍栽竹豈無間隙地可種竒花木惡彼競春妍愛此凌寒緑主人好藏書架插三萬軸挾册就清隂自課諸郎讀業成獻琅玕萬言猶未足殺青日無虛坐見長林秃送王成憲分韻得帶字王君名真愚惡世多狡獪千金為卜鄰喜我愚相類彼此兩忘形送迎嫌瑣碎客或不具冠主亦不束帶有時呼濁醪對酌取同醉殽核隨有無盤飱戒奢忲古人縱真率要不過吾輩君今别我行拂衣何綷䌨豈憶秋江寒鱸肥正堪膾檇李有青襟一一待品裁既無州縣勞亦鮮簿書債教育得英才君心豈不快嗟我愚無徒獨行恐招悔賸馥與殘膏何由復沾丐臨岐對樽酒不飲發長慨送徐三母舅我觀天下人一一皆有母獨我無母兒少小依諸舅朅來幸長成恆不侍左右微官逺鄉閭薄祿戀升斗舅從江南來出迎急奔走扶掖上髙堂百拜九頓首開樽呼小童具饌命新婦嬰兒喜牽衣效我前為夀豈是骨肉情天然知所厚歡聲動比鄰自卯飲至酉人生百年中此樂良不偶舅呼我來前我樂汝知不見汝猶見娣意豈在樽酒樂極翻成悲又恐别不久秋風吹薄衣斜陽挂衰柳恨無魯陽戈匆匆遽分手昔日渭水陽今朝潞河口世異情不殊所乏惟瓊玖除夜喜丁生餉酒戲用東坡饋歲韻呈景鳴汝礪結髮事詩書常以酒為佐買書不論錢得酒寧復貨書多酒滿缸不慕官職大天寒研生氷飲劇瓶屢卧光隂箭脫弦豈但蟻行磨不飲復不吟落莫可能過送酒兩鄰翁對酌相賡和送董訓導思學董子漢大儒正誼不謀利君為幾代孫家學尚未墜下帷誦詩書世事不挂意焚膏補日力汲汲求道義先達每指云是必清廟器安知古鼎彛不粥今市肆計偕來京師再就彤庭試拜官復儒冠刀筆恥為吏月俸縱云薄尚可供糗糒何必公與卿然後可行志吾知函丈前亦自有公事師生論議中豈獨在文字八閩善人多春風應逺被象賢古所稱知君諒無愧次匏菴先生版屋韻達官宜髙居胡為喜卑下豈是三命餘動欲循墻者天豫固甚豐自取恆欲寡何必大厦成而後虛三瓦無梁架榱題無牖飾丹赭惟有窗隙中尚能通野馬鬼瞰非所憂客來可延坐看雲數捲簾看月疑乘舸溫燠不知冬通明復宜夏有書常滿床有酒常盈斚自讀仍自斟髙情還自寫豈無數仞堂得志弗為也處默為姚廷佐鐘聲非不宏不扣常不鳴靈雞本司晨暮夜乃無聲自鳴鐘不祥夜啼雞遭烹在物尚如此况為物之靈處世有至道片言不可輕興戎與階亂聖訓何昭明十語九中理一失禍所生所以不如默終身安且榮仰觀卷舌星俯誦緘口銘直欲效瘖啞匪但守如瓶浴鳬仙人王子喬舊賜上方履雙雙化飛鳬翺翔雲霄裏吾鳬居水中隻影不相比春風楊柳堤秋月芙蓉渚新蒲細藻間浮遊復容與朝在河之洲暮宿渭之涘孰云兩脛短竟不致千里天然性好潔日日浴不已非是惜竒毛不屑受泥滓彼為稻粱謀唼喋禍所倚吾自愛吾鳬網羅知免矣齒落我年六十一已落第三齒若更活數年所存知有幾剛風著唇吻利與劍戟比豈待入腹中而後疾病起譬若建重門一扉常自啓外侮窺其間孰禦而能止又若築長堰隙穴不容蟻今已決尋丈不竭安肯已或言死與生其機不在此不見張相國齒盡乃食乳髫齓若編貝或有短折死此雖釋吾憂終焉非至理齒落竟何悲不落亦何喜但願不腫痛呌號動鄰里食物有所妨肴核宜棄置朝夕啖粥糜其味固自美出言有所妨對客宜少語况我之所病正在傷煩易憶我初落時掩口含羞恥只今落已慣與不落相似作詩記嵗月亦漫戲云耳同白巖諸公清涼寺避暑寺出髙城上已與塵世隔誰知眺逺人猶恨髙未極眷兹西北岑攬衣思峻陟初繞東岡行相顧戒勿亟叢篁夾疏松蒼苔封斷壁捫蘿心尚恐踏磴足屢仄登頓自忘疲攀援誰所迫山腰若稍平欲坐恨太窄倚樹憩重隂於兹休足力回頭瞰其下黯暗深莫測恍聞風雨聲疑是蛟龍宅排雲更直上從吏不能掖藤蔓直垂肩巑岏低礙額倐忽至絶頂一覽千峰碧始覺宇宙寬八荒無畛域不知上去天還有幾千尺長江地底來秪見一線白豈是禹鑿餘抑乃巨靈擘不然混沌初融液已無迹風卷白雲飛山銜紅日昃星斗懸碧空一一手可摘飛蓋結層軒翬翬若張翼持杯復髙歌沈思還對奕豁我千里眸愈我煙霞癖且勿論廢興俯仰懷疇昔從軍行驅馬出長城天寒日色薄四顧寂無人黃雲暗沙漠疆吏為豫言雲中兵屢黷近入陽和川縱橫恣殺掠少壯悉奔逃老弱填溝壑安得用韓范驚彼心膽落昨聞大將軍自比衛與霍張燈召賓御置酒縱蒱博誓封狼居胥單于𨽻蕃服此意豈不佳恐遂成疏略轅門荷戈者兩手凍如束雪深飢不餐氷堅渴難鑿靖邊未有期凱歌何日作欲歸歸未能未信從軍樂送陳子居主政天津收糧粼粼海邊庾積粟半紅腐每嵗猶轉輸道路日旁午簸揚隨沙塵漂流任風雨辛勤千里來輸十不得五田家米如珠官倉賤如土豈是入官人不知作田苦今日好分司豈弟民父母為國仍為民豈徒為小補送李德崇一别二十年顔面尚如舊豈惟不改顔長貧能固守自烹陽羡茶旋酌金陵酒聊以敘契濶為問當時友半死半漂零所餘惟某某增豫感慨懷停杯復低首翻思天地間萬物無不朽人比物雖靈安得與天久棄置且勿言君姑酌大斗題畫青青百尺松下有一畝隂南風吹松枝拂我膝上琴一彈猗蘭操再鼓白雪音餘響入松去枝頭作龍吟寄劉東山五首次國賢韻去冬天苦寒平地一尺雪長安百萬家十五告糧絶誰起劉司徒慰此民望觖莫學謝東山令我心愁結東山歸東山東山今益髙荆薪煮白石心逸亡身勞清風不用買明月時可招今日靖節翁何必仍姓陶雅志在山水所至輒搜竒君山十二峰髙深孰似之一峰留一月周遊嵗為期山花與山鳥相熟亦相思東山有耆叟古貌復古心古人不在今今孰為知音解冠挂神武歸來卧山林白雲似相逆英英起前岑白日未云暮青春先獨歸采蘭以為佩采荷以為衣釣魚不設餌况復為釣磯鷗鳥與公狎知公本無機月下絲桐為閻大參作下二首同琴操古且淡殊無恱耳聲所以世俗人紛紛喜秦箏秦箏雖恱耳安得如琴清對月一再鼓庶幾姮娥聽藥圃晴耘春初雨力肥藥圃發生早誰知百藥中亦自有惡草草性易滋蔓藥苖易枯稿去草勿去遲趂此日杲杲平蕪曉望懷古視平蕪嘗聞少陵語今公復有懷所懷在何許前望龍盤山道路修且阻草木鬱蒼蒼獨不見伊吕五言絶句東莊十八景為匏菴先生賦東莊在東城宛似江村裏翠竹護茆簷柴門映流水右東莊菱頭初刺人菱葉已零亂試問采菱歸作蔬還作飯右菱濠主人愛此君手植三十畝明月落空庭清風來短牖右竹田地僻人蹤少溪深樹影多遙看泊舟處斜日曬漁蓑右南港樹影連村暗荷香隔岸聞移舟向南浦驚散鶩鵝羣右北港雙井何人鑿村名今尚存試看欄石上或識漢文園右雙井村稻畦如矩方畦疏收亦寡從知道人心不是喜圓者右方田春暖蠶初浴柔桑緑未勻小姫持酒果來祀馬頭神右桑洲細雨紅初熟薰風緑滿林采時留幾顆明日飼山禽右朱櫻徑上岡振衣塵下岡恐還有不識岡上頭能容結茅否右振衣岡流水縈林外回波繞檻前天光與雲影不得直相連右曲池垂楊夾古岸容我寄輕舠莫向江湖裏驚風挾怒濤右艇子濱青青丘隴上曄曄紫芝芳衆草驚秋色雲根不著霜右紫芝丘仙桂從誰折橋名是處傳人言吳季子家住水東邊右折桂橋家近神仙宅蒼松一徑遙間來弄泉石無意問參寥右全真館古人已云徂今人思繼武應知後來人要以今為古右續古堂日暮荷鋤歸就此軒上息西疇猶未耕遲我養餘力右耕息軒煦煦依浮藻遙遙避釣鈎濠梁隱君子知樂不知愁右魚樂亭寄儔弟故國青山好春來夢不真去家雖太近猶是未歸人題陶知州菊莊愛菊因投紱柴桑亦任真誰知千載後復有姓陶人聞李健齋斫窗前雙桐詩以唁之斫却青桐樹牆根自少隂流金日應鑠何物助清吟題扇茅屋藏深樹柴門對逺山主人多不出杖屨得常間五言律詩宿安平驛昔年逢險厄今夜宿安平流水船前過微風樹底生入雲孤鳥影隔岸一蟬聲追憶檣傾日中宵夢亦驚集天趣園二首髙丘構華屋物理近人情止水留雲影微風度鳥聲委泥花有恨匝地草無名欲試登山屐﨑嶇路不平愛客頻移席張筵復傍池酒行常引滿坐久不知疲風動花增媚雲開石獻竒休文才最富無藉雨催詩遊觀音閣二首石壁臨無地江流激有聲檣烏依岸宿水鳥避人行日度松隂轉風來暑氣平要知形勝在歷歷問山名極目江波濶驚心沙岸摧倚巖誰搆閣斷石自封苔水鳥隨潮去風帆逆浪來江山千古恨盡付掌中杯寄堵樂耕兩地無千里誰能憶舊逰李雍歸北海徐稚卧南州月出微雲斂風來宿雨收羡君雙足健獨上水西樓路僻書難寄官間客亦稀卧聽黃鳥哢佇看白雲飛月暗燃藜杖風輕換葛衣南來才一月無日不思歸贈瀚姪白屋無遺業青年自立家衆皆稱汝儉我獨惡人奢客到惟供茗春來不種花有田仍負郭著意樹桑麻春夜寒猶峭門前雪更深老豫嘗獨坐謝子逺相尋共説耕田樂能諳聚族心大家聊自足何用積黃金新春寒甚雨雪連日艱於行路瀚姪省豫南都八日而後能至其勤甚矣侍間因問羣從治生之道歷歷為我言之且為一二好遊者憂其用心不亦厚乎因賦此以贈送引之黃門兩廣勘事一别成萬里此懷良黯然鳥聲人語雜山色水光連禦瘴常攜藥調琴更解弦清風盈兩袖千古激貪泉送程瑤一夕金風動飄然振客衣自知秋尚早又逐燕先歸水落江流急天寒樹影稀獨憐城上月不減舊清輝别春九十春光盡如君惜别何樹頭花片少林外鳥聲多撫景頻移席怡雲獨放歌明年知此日還向客中過次師惟明韻西湖岸東畔上有故人居會數常憑夢情真少寄書直鈎聊作釣大澤豈憂魚試問寒潭月年來虛不虛聞三弟移居城中喜作城郭依青嶂門牆帶碧流出逰無十里來往有孤舟蝦菜隨時具詩書不逺求已聞開小閣何必更髙樓書李時馨扇初夏天猶冷疏簾日漸長讀書窮壼奧問字識偏旁對案常忘食摳衣屢上堂取青如拾芥老我有餘光題沈克寅扇功名無捷徑學問有階梯夜寢常看月晨興每聽雞要從年少日思與古人齊老我猶看鏡衰年更噬臍題林廷振扇前舟泊沙汀早發不相待岸口樹隂多天邊風色改撫几對青山何須更滄海同時採珠人今有幾人在北望煙火千家瘴霜風十月天羣臣不從駕八駿自巡邊日落孤城逺雲低朔漠連翠華何日返黔首得安眠朝天宫習儀回道中口占一首翠華前日出戎輅幾時還綿蕞依窮塞嵩呼出逺山雲迷青瑣闥月照玊門關漢檻嶙峋在憑誰許一攀船窗對月船窗看月出光彩射人眸水底魚龍避林間魍魎愁影分雲外樹波動驛邊樓五月江湖上蕭然似早秋送李司徒南國佳山水匆匆未遍逰棲霞聊試屐靜海暫停舟道梗誰能進身輕不用憂勸公無入險一月住揚州送萬生潤至日關將閉明朝客欲歸一身依棘寺百里問庭闈水落溪聲靜霜寒樹影稀故鄉如問我老病不勝衣聞渡江諸親遇險驚歎有作記得江頭别匆匆又一年船開官渡口帆落寺門前不守垂堂戒翻思彼岸懸近傳消息到令我意茫然送唐黃門國計勞神算邊儲輟從臣回頭青瑣近隨路綵衣新庾嶺風迎節清湘月照人此行成萬里樽酒莫辭頻寄王子麟潘惟喬扁舟君送我恨不送君還雨過添新水雲飛戀舊山客窗長畏病宦轍幾能間雙騎何時到秋風為啓關次匏菴先生煨橘韻白雪枝頭蕊黃金葉底團既疑為火齊復認作氷丸冷熱隨時改調和適口難爐中方就灼掌上復傳看軟比雞頭肉圓如鶴頂丹瓤虛還可剖核小豈容鑽追念致來逺還憐味帶酸殷勤重鄉味常貯水晶盤七言律詩元宵應制二首一年好景上元多又送春聲到踏歌燈照九衢通禁苑月明雙闕近銀河虹橋影裏龍旗動琪樹隂中鳯輦過歡樂不忘民疾苦皇華逺近布陽和玉宇璚樓入望賖五雲長護帝王家魚龍出沒燈前戲桃李芬菲火底花鳯吹聲低風力細雲和奏罷月輪斜兒童未識升平象笑指祥光作曉霞國賢憲副見寄次韻二首留都無處不堪遊何獨雞鳴與覆舟淡淡煙籠淮水月疏疏雨送秣陵秋城邊好景看將遍野外荒祠弔未周已約詞林諸老宿肩輿九月上牛頭散地偏宜著菲才清時誰合過江來庭前趂雨移松柏屋後先秋去草萊紀德謾尋前代石讀書還憶舊時臺故人相去無多路時見虹光燭上台聞石田逰荆溪欲觀豫所藏小畫以詩迎之畫船未泊五雲溪信息先傳滿邑知花漸飄零愁置酒鳥猶啁哳苦催詩莫憂震澤波濤濶須信南宫筆畫竒自掃水邊山下路候公杖屨欲追隨次石田觀畫韻錦標玉軸家家重任耳人多任目稀鑒藻要知顛末在丹青只論古今非山居幽寂柴門迥溪渚蕭條野鶩飛忽憶平南渡江日倉黃七帖尚藏衣石田詩祗言畫而不言書故末句及之豫莊晚步扶笻間步洛橋東水色山光迥不同黃鳥引雛青嶂外緑楊倒影碧波中分秧日近愁無雨刈麥時來喜有風造物可隨人意變較量笑殺兩鄰翁和楊少宰孿子韻屋頭不用聽靈烏聞得家人笑語呼夜半燈花長一尺朝來日影射雙弧藍田種就連城璧滄海生成照乘珠家學淵源知有自勿愁參魯與柴愚送周生楷千里尋師到石頭思鄉忽上仲宣樓道逢二鳥人爭羡賦就三都志未酬江上芙蓉花試雨岸邊楊柳葉驚秋歸帆好趂東風便昨夜髙堂夢逺逰送李府丞乃兄某新年莫恨客中過未有春風到薜蘿池草自成非夢得塞鴻行斷奈愁何今宵對月同尊酒明日中流起棹歌千里相思定何處夜深獨卧翠巖阿次東園先生除夕韻爆竹聲殘夜未央六隂極處轉三陽羲和自有無窮意鳯厯因留不盡行去國兩年猶昨日縣家百里亦他鄉換符祀竈聊隨俗自歎間官反學忙送馬太守還任兒童竹馬候江邊行路人歌太守賢淮海兩堧皆赤地合肥一郡自豐年甘棠樹底還聽訟緑柳隂中復課田太史續書循吏傳芳名合置李離前次東園先生齋居韻東園新竹有新居五月長齋此屋廬先生不出五月矣畫省喜瞻紅日近碧山悵望翠屏虛心存國計紆籌䇿道在吾身任卷舒賓客到門俱有意案頭勿著絶交書次東園先生春雪韻雪花如掌暗長衢緑樹粧成白玉株屬國一心惟在漢將軍中夜已平吳忍寒獨立階前鶴攫食羣飛野外烏凍硯連朝未消釋詩翁莫怪有新逋送孫少卿殿頭供奉老鴻臚心欲求間過舊都月請俸錢真不薄春遊山水自堪娛禮成為奏三年績家近渾無百里途明日玉階仙仗外也應隨衆效嵩呼哭太皇太后次鄭亞卿韻二首地維將缺莫能支哀詔函封下玉墀任姒德音堪繼續髙曹家法可差池外廷不與當時政中壼還留舊日儀夜夜長秋宫裏月清光慘淡似凝思萬金方藥竟難支臣庶悲號望赤墀長樂春歸花滿地影娥人散月當池一朝奄棄三宫養百世長存九嬪儀聖子神孫哀罔極春來秋去不勝思環山樓為陳太僕瑞卿作滁陽新起見京樓樓外青山繞四周春意自催禽鳥樂浮雲不記古今愁樹籠月色千家暝松度風聲萬壑秋莫道諸峰能掩閉舉頭西望是皇州夀包太守父八十池陽太守年六十猶有八旬翁在堂白髮還為稚子舞斑衣自學老萊裝松髙百尺根如鐵菊至重陽花更黃逺我不隨賔客後雙溪同進紫霞觴送韓司徒君命臨門不敢稽嵗朝就道尚嫌遲春風前引朝天佩冬日還留去國思西北軍興常告乏東南民力又堪悲司徒自有生財道誰謂時艱未可為挽伏羌伯竹帛曾書大將功百年威望重西戎戰酣塞上雲連地敵退轅前草偃風禦侮自來三䇿在殺身曾有幾人同至今血染山頭石雨洗年深色更紅夀林廷振平市街東第一樓主人雖老尚風流六旬下夀明年是十二同庚與宴不歌吹忽驚梁上燕起居無藉杖頭鳩鳯雛稛載來江右一笑能消萬斛愁夀都景章八十已到磻溪感夢時何心更慕帝王師曾逢仙授長生訣每遇人吟遣興詩囊裡有錢堪買酒鏡中無髮可成絲髙年誰似翁強健日日登臨力未衰次吕太常賞牡丹韻淺紅深緑自相承妝靚何勞粉黛凝種自洛陽城裏乞詩從長慶後來增若誇國色應無敵欲殿春光恐未能只此尚嫌花富貴不須更染碧金稜侍家君逰牛首登兜率崖次青溪韻老大登臨興尚豪逺隨杖屨竟何勞道傍雨洗松根瘦樹杪雲連石筍髙僧愛孤虛新起閣鳥嫌峻極不營巢為休足力頻思坐欲問青天首屢搔次前韻答吕太常公負詩中一世豪朝吟暮咏未言勞衰年莫作青年看小隱還輸大隱髙夜靜燈殘蛾撲火春歸花落燕爭巢細評物理應長歎短髮蕭蕭不耐搔送魏都憲奉敕江南僅兩年蜚聲已達冕旒前何人為補中丞缺此日還將舊政傳貪賄吏驚先解綬弄兵人散欲耕田願公為國持三尺一嵗官應見幾遷送邦彥學士先生二首散地偏於懶性便我來君去思悠然出門是處成三昧視日何人記八甎夜靜月移花影亂春深風度鳥聲圓而今每憶當年樂始信瀛洲别有仙朝陽門不比春明别逺無過是兩京名姓尚留東觀在官銜不減北扉清船從白鷺洲邊過馬向烏衣巷口行冠蓋幾人來送别獨豫南望不勝情沙河道中次周檢討韻微風無力可飛沙天氣如春自可嘉勒馬問途將幾里入門留客是誰家義魚灘淺氷初合射雉林深日漸斜遙望萬山環拱處六陵尚有五雲遮謁劉諫議祠蕭蕭風木古祠前千載英靈尚凛然鋭意一言能悟主豈知無力可回天寒蟬抱樹何由化凍雀爭枝未肯還溪澗絶無蘋藻在不妨一勺薦甘泉西望泰陵恭賦北斗杓西是泰陵小臣瞻拜淚填膺功髙堯舜曾無忝道在詩書可並稱遏密豈知聞四海太平何必見三登詞林老宿心思竭欲繪乾坤恨未能時修實録未成故云回至清河小憩風靜雲開天日晴草平沙軟小輿輕蒙茸虛有狐裘在蹀躞時聞馬足聲賣藥僧歸山麓去負薪人避道傍行倦來暫憩清河側折足鐺調骨董羮和石學士豫莊韻四首招隱何須賦小山杜門更欲建重關采菱歌落雲煙外打麥聲來咫尺間昔日種成松老大清晨放去鶴飛還道人本是心無事較雨量晴亦不間長鑱不用斸蒿萊數月渾無一客來帶雨初移庭下竹試花又見臘前梅月明松徑隨山轉岸仄柴門逐水開莫道白雲飛不去有心長護讀書臺鏡裏叢叢白髮新癡心方且學修真論文客到常辭出問性人來不厭頻短牖南頭修竹譜曲闌東畔酹花神夜深篝火尋芝术勉強支持此病身矮屋低墻草樹平百年别業喜初成滿頭白髮猶忘老對面青山不記名行路喜逄田父罵出門怪有野人迎春禽何與農家事布榖聲聲為勸耕艤舟蜀山候沈石田晨起聞已過悵然賦此自到衰年常懶出終朝何事坐江干蘭槳桂橈留黃瀆茗碗薰爐對蜀山無奈寂寥呼晚酌可堪風雨作春寒相迎三日還相失始覺人生會面難方山送别逺上方山更土山尋春選勝送君還故人情重思投轄明主恩深見賜環車騎漸分斜照裏旌旗猶在萬松間利名自古誰能脫今日輸君破一關請柴墟賞紫牡丹十年前賞舊花欄幸喜重來得飽看謾插藩籬防折損欲留富貴補酸寒竹籠無藉青絲菜畫省應憐紫玉盤明日花前須盡醉一畨風雨一凋殘登雞鳴塔次白巖二首浮屠髙倚石頭城不信慈恩獨擅名萬里空濛看鴈過一聲咿喔聽雞鳴長江細浪添春雨半壁斜陽弄晚晴搔首問天知不逺碧雲深處有人聲寶輪矗矗倚天髙拾級相從豈憚勞東望風煙連魯國西來雲雨失臨臯煩公倚壁題名氏容我憑欄散鬱陶鈴語聽來渾不識恍疑江外落春濤復次賞花韻珍重名花置曲欄百年能得幾回看未開長怕春風惡載酒還愁夜雨寒簾幕髙縣垂地碧鸞凰欲下繞空盤詩人有意來重賞為語羣兒莫折殘遷居後涇川以詩見惠因次韻莫因四壁笑相如自愧無能稱此廬避雨暫為終日計癡兒便擬百年居酒酣夜卧窗前月睡起朝翻架上書正苦炎蒸侵病骨可堪鳯厯數歸餘用韻答白巖誰説東遷意不如青山重疊繞吾廬可憐京國繁華地還似江村水竹居蛛網未應封筆硯燕泥偏欲涴琴書願公廣厦成千萬大庇窮人喜有餘次答涇川每讀新詩意戄如虹光連夜貫吾廬山東羣盜無寧日海內何人有定居三尺尚存腰下劍一編不廢案頭書髙軒來日能相過玉屑霏霏聽緒餘送房參將父子親曾授六韜十年不試怒衝霄參戎新沐君王寵萬里寧辭道路遙潯水月明烽火熄蒼梧雲破瘴煙消功成會見封侯日宣政門前插左貂次白巖韻江壖潮落水痕深江岸樓髙近十尋雲鳥影從窗外度水龍聲在樹頭吟空林雨過無三伏石竅風來有八音自古國謀多野獲不妨乘興數登臨次白巖西亭韻橘中妙理不容談簾外青山自可耽鳥度方塘歸瞑樹風吹急雨洗朝嵐詩章立就公何敏酒令方嚴我不堪回首故園無百里對人休唱望江南鰣魚次涇川韻水族紛紛此獨清鸞刀欲下細無聲澄江網集波濤濶深夜人喧炬火明食指動知嘗美味澤梁禁在説漁征膾餘棄擲還珍重鱗甲支離覺漸生和鵝湖留别韻昨夜雨聲先作寒朝來那復聽鳴鑾風前莫弄桓伊笛日下應彈貢禹冠老去著書猶未晚病中投紱始知難人傳藥石言盈耳尚有囊中未試丹邀鵝湖過山莊避暑小洛橋西碧澗長濯纓不必問滄浪五湖地濶春無瘴六月山深夜自涼池面雨浮菱葉亂門前風細稻花香髙旌暫住柴門裏音信何愁滯一鄉送李亞卿致仕才看平冦歸臺省又見投簮出國門報主有心身尚健論兵無地舌空存青山夢與紅塵隔緑野詞從白雪翻歸路正當春景暮東風江上落花繁送嚴州趙推官百年琴鶴不須携兩袖清風拂釣磯晝靜訟庭芳草合春深山館落花稀鄰封佩犢人猶在闔境飛芻卒未歸安得家家千樹漆不愁無食與無衣送列縣丞致仕行囊不辦買山資問我先求贈别詩有子入官心自足任人生謗怒何為門前舊種千竿竹屋後新開五畝池賓客未來風日好乘間獨釣大江湄雞鳴山和鄧司徒習靜空山物物幽出關何必問青牛閣依巖構如巢小雲過簷前似水流斷壁斜陽紅欲斂逺峯新雨翠偏稠雞鳴獨占城西勝蓬島徒傳海外洲和白巖再疊前韻山城面面俯長溪萬古溪流不向西鶯逐春風林外囀鴈歸寒渚雪中迷雨晴石上泉聲細日落巖前樹影低老圃不須長抱甕只今新水已成畦夀張司冦乃翁鸞書昨夜出天扉八座貤封世所稀鐘鼎已非前日養斑斕還著舊時衣雲留咫尺無勞望夀過岡陵不用祈堂下有人吹玉笛分明為奏鶴南飛夀劉尚寶克柔留都間靜獨符臺散地何煩濟世才白髮幾年愁逺别綵衣今日喜重來銀絲細斫秋風鱠玉液新篘雪夜醅千里江山隨處樂夀筵何啻一時開次西涯假山韻秋深病起強登臺不倩人扶亦壯哉怪石立當狂客拜新題還待醉翁來空巖泉落琴初奏斷壁雲生錦未裁誰道岡巒真是假層層疊疊似天開觀梅次西涯韻帶雪移來竹外枝藏深猶恐或傷之百花頭上應先發二月江南已過時莫向髙樓吹玊笛秪宜東閣賦新詩廣平縱使心如鐵相對寧辭酒滿巵送田尚書致仕一朝投紱竟何心愛國惓惓意自深老去身猶依輦轂春來夢已在山林送迎門外無生客供具囊中有賜金莫道二疏蹤迹逺古人還恐不如今送楊中書代父掃墓辦裝曾見賜千緡乘傳何煩更問津禋祀本承明主意出門非愛逺逰人長亭客散車塵暗舊隴春回樹色新今日故鄉誰不羡鳯池相繼掌絲綸皋湘書屋次西涯韻為敬所閣老作碧欄朱檻俯沅湘不比長沙隔異鄉江上水清魚可數徑邊霜冷菊偏香鈎簾靜愛青山近撫卷間知白晝長昨夜客窗真夢見海陽雲樹晚蒼蒼過歌風臺項蹶嬴顛四海平更思壯士作長城豈知産祿初萌蘖應恨韓彭已就烹富貴漸生亡國態英雄偏重故鄉情風雲不作歌聲歇日暮惟聞鳥雀聲飲仕弟淮安官署汝到淮南已半年汝兄無夜得安眠須知此會成佳遇莫恨相逄是别筵古樹蒼蒼留夕照斷鴻嚦嚦唳霜天追思老祖清風在閭巷歌謡百世傳和鄭先生病中見雪韻春愁萬斛幾時消榖日隂雲自嵗朝逐客正迷秦嶺路詩人猶記灞陵橋草根凍合猶含潤木未花開亦旋飄忽憶詞林諸故舊五更騎馬正趨朝馬先生徙宅戲贈家具能勝幾兩車車聲軋軋過前閭瓶罌未卧知藏酒行李雖多半是書雪後園林春事近夜深燈火客窗虛匆忙好記魚軒在白髮年來恨獨居觀史黃門蓮葉硯有感石蓮不信世人栽太華峰移一瓣來髙潔豈為盛酒器堅貞長傍讀書臺縱然剝落傷全璧猶勝沈埋卧緑苔寄語黃門好收護玉函珍重莫頻開一葉芙蕖翰墨香百年故物藉珍藏換鵝人去遺書在瘞鶴銘存舊迹亡承露尚堪毛頴飲含汚不怪客卿狂皂囊疏草常咨爾未敢淹留在玉堂硯乃宜興王氏舊物其甥張雲翹得之不戒於僕遂至殘缺既而為友人所紿售於毗陵俗子李鐸無所用又入方莊李氏兹歸巽仲黃門此詩蓋紀實也二十五年前豫嘗見之卷中尚有彛齋雲林諸公往復數書及履道銘一首未刻今皆零落獨倪迂一書存耳可歎可歎元宵遇雪次鄭東園先生韻記得前年此夜中觀燈曾入建章宫三千火樹髙低見十里星河逺近通破敵有時思將帥駕虹無地覔仙翁今宵踏雪街頭去贏得璚瑤襯軟紅送陳黃門父還閩白髮新封諫議歸山林巖壑盡光輝長溪水落灘聲靜逺岸秋深樹影稀雙斾清風迎紫誥滿船紅日照斑衣天恩浩蕩應難報早遣仙郎侍瑣闈送徐二母舅簫鼓喧喧滿畫船路人遙指作神仙居家不必千金産贍族先分二頃田雲影倒流歌扇底燕雛輕拂舞筵前誰知元舅長相憶夜夜池塘夢惠連待曙樓次西涯韻為俞黃門作樓頭清旭斂輕霏樓下還看過客稀秉笏有人思待旦髙居無地比凝暉啼烏眇眇聲將歇彩鳯翩翩勢欲飛今日皂囊無别事萬言意只在宵衣吳文肅摘稿卷一
