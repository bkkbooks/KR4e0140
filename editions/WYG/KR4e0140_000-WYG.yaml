body:
  text: 呉文肅摘稿别集類五明提要臣等謹案吳文肅摘稿四巻明吳儼撰儼字克温宜興人成化丁未進士官至南京禮部尚書諡文肅正徳初儼主順天鄉試以為臣不易命題為劉瑾所怒以飛語罷去瑾誅乃復進用其程文今在集中存其事也其集初蔵於家至萬歴甲申同邑王升武進莊煦及其從孫達可為選而存之其孫士遇始刋板故名曰摘稿史稱儼性方嚴操履清慎為文章莊重簡古詩詞清麗可諷今觀所作當何李未出以前猶守明初舊格無鉤棘塗飾之習其才其學雖皆不及李東陽之宏富而文筆舂容詩格亦嫻雅往往因題寓意不似當時臺閣流􅉽沿為膚廓雖名不甚著要與東陽肩隨亦驂之靳也乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8958a62c51aea33f9fb45d855b9e657ba85a85e9ad370df58207276a3bf0a299
