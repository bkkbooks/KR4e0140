body:
  text: 吳文肅摘稿巻二明吳儼撰七言律詩硯瓦墩為周仲鳴作孰移龍尾晉陵來風巻波濤翠作堆髙樹恍疑為象管薄雲遙認作松煤春泉不洗千年垢秋蘚常封數尺臺形勝眼前人未識久藏榛莽待君開和鄧司徒逰神樂觀登醴泉亭韻二首不學修真訪羽仙曾將詞賦奏甘泉畫龍可致千峰雨養鶴還謀二頃田厭聽南音歌樂府笑持野䔩薦賓筵追思四老同逰日倐忽於今十五年壬戌秋與王東麓馬紫巖楊邃菴李東莊同逰故云留都官府似神仙下馬閒聽石上泉但得醒心兼洗耳不須問舍復求田黄鸝避客藏雲樹翠竹分隂入綺筵莫道人生難聚首重逰仍約在今年同白巖諸公清凉寺避暑二首城西古刹倚層空鷲嶺東來有路通樵唱不知蘿徑外梵音只在竹林中隔江鼓棹人乗月溽暑添衣客避風時周大理増木棉衣故云白髮老僧殊解事問誰詩句似休公古寺遙看入碧空竹間石徑暗相通九重宫闕雲霄裏千里山河指顧中地迥自應消暑氣樹髙偏易起秋風翠㣲陳後主亭名舊址今安在不用殷勤問逺公中秋夜與儔弟翫月用西涯韻誰懸明鏡在中天把酒無從問謫仙昨日雨隨風作黨今宵人與月俱圓對床已辦留同叔得句何煩夢惠連弟勸兄酬須盡醉西樓一缺又明年鄧司徒宅賞菊折得東籬數種花白衣未到酒須賖低昻鶴頂迎風舞零落鵞毛帶雨斜龍腦清貞香不散御袍端正色偏嘉司徒宅裏頻來看何必陶潛處士家夀賈鳴和乃翁神仙誰說駐崆峒潁上親逢百嵗翁語笑不談今日事衣冠真有古人風芙蓉花發香猶淺瑇瑁筵開月正中拜舞司成年老大膝前還看作兒童荷花燈分明玉井小芙蕖髙蓋亭亭出翠㣲暫借東風開紫熖不愁清露落紅衣六郎自怪年年熱妃子應憐歩步非笑殺詩人看不厭夜深更僕尚忘歸小圃絲𤓰叢生有一蒂三四莖者園丁以為怪一老僕獨以為瑞來語予予曰謂之怪者非也謂之瑞者亦非也乃賦一詩以記之秋圃叢生𤓰並蒂我知非怪亦非祥氣鍾此地偶同發物有何心獨擅塲翠蔓出墻風裊裊黄花盈架露瀼瀼自嗟潦倒無他祝但願兒孫滿畫堂城南曉行限韻與白巖雙溪同賦侵晨出郭旋添衣自笑浮生未息機終日馳驅何所事故鄉咫尺尚忘歸江空月落潮聲小野曠天低樹影㣲不識饑烏底心性避人還欲向人飛聽鄭伶琵琶鄭伶名價重江東五百梨園技盡空子夜猿啼殘月白上林鶯老落花紅江頭商婦愁無限塞外明妃恨不同可惜曹綱今去逺何由兩市鬬西風雪中送李時馨嵗暮天寒朔雪飛故鄉有客苦思歸據鞍不覺頻呼酒對竈何妨共燎衣路比山隂清絶似人如東郭履全非健翁久矣無消息為問年來瘦與肥送汪海雲浮溪之後見斯人意廣才髙志未伸愁對落花先置像喜看脩竹為傳神輕㠶欲去常逢雨久病歸來正及春要識松楸須問我洛橋西畔石嶙峋夢予莊夢到山莊自扣扉山人驚喜主人歸民饑莫怪牛羊瘦嵗歉誰言地土肥庭草色囘春意早林鴉聲亂暝煙㣲醒來何事猶惆悵水浸磯頭舊釣磯諭驥兒二首交㳺零落少知音驥子須當識我心盛酒盆埋紅杏底采蓮舟繫緑楊隂梅開溪上千株雪橘熟霜前滿樹金終日擊鮮應溷汝行厨多只在山林眼底何人是賞音老年心異少年心春深倚杖聽鶯語日午移床就竹隂倒屣自迎門外客買山無藉槖中金平生所愛惟柑橘歸日須看綠滿林用韻贈沈夀卿吳人相對共吳音須信儂心即若心旅館今宵看月色故園何日醉花隂門前不厭頻來客囊裏猶存舊賜金吟得新詩宜自愛莫教輕易與鷄林拜王司馬墓海内驚聞早拂衣白鷗猶道未忘機自從禹穴探竒去不見遼城化鶴歸人逺鳯臺春寂寞月明仙嶠露霏㣲英靈耿耿知何在應附龍髯左右飛逰土山寺用前韻倦向雙林欲解衣入門何暇問禪機义魚稚子持竿去賣藥山僧負米歸松逕月明樵唱逺竹林風細磬聲㣲歸來輿皂心偏急遙望重門步若飛飲魏國園亭臺榭秋深百卉空空庭惟有鴈來紅曲池暗接秦淮北小逕遙連魏闕東富貴豈争金谷勝文章不與建安同上公亭館無多地猶有前人朴素風惲憲副書約春盡㑹龍江驛送客時登黄鶴樓江波日日向東流詩人謾道眼前景老叟空懐身外憂鸚鵡洲邊春草細鳯凰山下暮雲收故人旌節聞東下借問何時到石頭乙卯季冬見白髮效樂天體三首白髮新生豈少恩天教小子漸稱尊一莖便作千莖種四十將開八十門拔去自家難諱老染來何物可除根後生切莫輕前輩日月隨君萬馬奔右喜白髮曉來對雪常梳髮鏡裏何縁得上頭豈為作詩真太苦或因謀國有深憂官叨七品誰言貴年過三旬未識愁莫是家庭元有種人言今日可憑不右問白髮人生大率百年期四十寜當髮白時秪許頭顱留少雪可容髭髮盡成絲恒言未敢先稱老壯志安能便服衰春笋秋禾今已悟東坡兩語是吾師右止白髮除夕景鳴餉酒戲作小詩奉謝一詩換得兩缾罌文字年來價漸輕潤筆不知金石例危詞長恐鬼神驚嵗除狂態還依舊老去浮名敢浪争明日衣冠隨萬國山呼不盡小臣情元旦醉後與景鳴引之聨句戯柬國賢醉邊倔强妄稱兄醒後心降氣亦平藏鹿隍中真是夢伏尸蝸角竟何兵棊能不著為長勝辯到忘言更有情忽憶木鷄因有得獨輸全徳與隣生景鳴和章欲任癡名予不敢許復次前韻低頭真合拜吾兄兄自無言意亦平地讓一頭明退舎予居與景鳴第相連而退一舍戰曾三北敢稱兵亡誇為有予真妄智欲成愚子不情擲筆據梧聊假寐令人千載憶莊生送馬學士人間何處是蓬瀛翰苑相傳近玊清蒼蘚階除春雨合綠槐庭院午風輕安眠竟夕無宣詔讀史隨人有品評今日長卿仍姓馬又因消渇暫南行送西寜兵備潘以正五月霜風巻斾旌六蕃相率道傍迎只今塞外無烽火空負胸中有甲兵校獵平原秋草碧投壺客舎夜燈明誰知緩帶輕裘者自是官家萬里城送王世賞雲南提學歸向滄洲近十春始持憲節出風塵干將可合埋藏久薏苡何妨謗語頻絶塞競看金馬客雄詞驚倒碧鷄神他年宣室虛前席應為蒼生訪舊臣寳應湖阻風琉璃城闕水晶官玉局仙人到此中便覺黿鼉忙徙窟不妨波浪直翻空隔溪茅店雞聲早千里家山月色同明日檣烏幸無恙莫教深怨石尤風送充道乃兄某南歸友于一見即成别不欲緇塵上素衣霜信似催鴻鴈去月明如送鶺鴒歸官河氷合來時路江渚烟迷舊釣磯又恐移文先有在不容重采北山薇挽周月牕醫者南來北去任天真到處逢人論谷神醫不專門兼老少藥無定法有君臣讀書牕小能留月種术堂虛尚貯春愧我獨無遷史筆倉公傳後續斯人和西涯先生擬卜居宜興韻三首畫船曾泊舊城隂綵筆親題漢上襟夢卜敢忘明主意登臨不負壯年心幽并客向沙塵老湘漢人愁草木深陽羨溪山真不惡即今坡老是知音一雨商巖萬里隂清時亟欲解塵襟田園有興成前約杖屨相從是夙心玉在銅官山益潤珠藏罨畫水增深古來風土同荆楚不用咻咻學語音莫為槎頭憶漢隂長橋南下可開襟采芝試聽山人曲伐木應知長者心江夏米無陽羨好巨區水似洞庭深勿言少賤無知已草澤中間有賞音用前韻戯柬徴伯五雲溪傍太湖隂不藉三江逺作襟誰說市朝成大隱要知父子本同心石能攻玉皆為礪水可容舠即是深何事卜隣無一語疑君未欲聽南音用卜居韻邀國賢賞雪宻雲千里夜同隂有客相邀話素襟凝結固知由地力豐登誰識是天心紙牕外借三分白瓦隴中鋪一尺深五鼎待君同下筯時新作五小鼎莫勞終日聽車音西涯宅觀梅花東風聊借一枝春特慰巡簷索笑人花比去年香不改詩從今日思尤新舊傳傅老能調鼎近許逋仙為卜隣忽憶故園千樹雪無由獨步大江濱次敬所少宰贈傅北潭韻重重烟樹數家村王事何須與客論老鶴風前聲更逺孤松雪後色長存萬言不盡明公意一飯難忘聖主恩今日鷄泉東咫尺草亭聊爾寄乾坤送張亞卿進萬夀表分得秋字一尊酒餞小瀛洲明日神京拜冕旒雲為從龍歸北去水因朝海向東流清風到處迎僊斾好雨隨時送客舟萬口山呼意難盡獨將金鏡續千秋逰天竺佛國誰聞有此山門有佛國山三字故云幽深彷彿類商顔鳥歸故道如相引雲起前岑自不閒月落鐘鳴僧入定風吹酒醒客忘還峰頭何處飛來石長鎖松筠苐一闗臂痛漸愈次張東海韻三時臂痛一時瘳冠幘依然又上頭病脫偶逢醫國手功成全藉醉鄉侯香蛇浸酒故云鍾山髙處凭欄望淮水東偏載月逰酒思詩情渾不减臨池興復似前不戱築雪假山次韻風驅滕六似哀號為恨儂家輦築勞轉日可無雙岫在礙雲真有一峰髙經營意匠輸天巧掩暎詩斑上髩毛西蜀雪山誰是假同歸滄海作春濤送龍致仁主政管閘伯髙何但省郎才為有詩名水部來官驛算無千里逺斗門日放幾迴開深春尚擁藍闗雪未蟄先驚夏澤雷莫為苦吟留過客舟行到此已心灰諸公以絲𤓰詩韻險復賦一首不向東陵學種𤓰偶擕一本自隣家苞中未見青絲縷架上先看滿眼花雙實交加垂曉露數莖蟠結掛秋蛇天寒百卉凋零後老蔓青青更茁芽次杭方伯夀日韻梅花長自占先春一度相看一度新投紱正當垂老日歸家猶是未閒身雪晴風煖笙歌細弟勸兄酬禮數頻試問尊前稱夀者㡬人榖日是生辰世卿誦鬭草聨句戯次其韻懶向東風看落花筠籠摘草戯相誇欲尋指佞兼醒醉直造山巔與水涯色弄青紅根可辨味分甘苦性應差莫因今日兒童戯便作神農註䟽家示園丁為我先營養老資青青雙髩欲成絲賞花壯日心猶在抱罋當年力已衰園小不宜遺地力春深切勿後天時綠隂如幄花如錦應共佳賓醉玉巵夀伯舅謙齋翁甘雨和風遍域中太山喬嶽可論功人思識面多瞻仰天本無言自感通清淨宛如曹相國純誠全類富韓公我於元舅無他祝鶴髪年年侍九重送顧士亷編修父還松江北來南去㡬多時怕見緇塵上素衣斜日城隂千里别秋風江上一㠶歸鱸肥不用思張翰鶴唳誰將吊陸機莫怪冠裳苦纒縛封章早晩到巖扉寄師惟明白晝遲遲玉漏沈北牕清興在孤吟半生未試屠龍技三刖無慙獻璞心自有文章齊白璧不須籯槖貯黄金緘書為托南飛鴈一入青冥思轉深送郭大尹魯瞻山隂未久又朝歌南北民風竟若何圍帶減縁勤撫字閭閻静為緩催科棠梨花外雙鳬下楊柳隂中匹馬過到處喜迎賢令尹兒童婦女笑聲多夀楊方正乃翁笑傲乾坤八十年垂垂白髪暎朱顔髙情已在羲皇上遺愛猶存召杜間清白傳來知有子利名看破覺無闗長生要訣誰能識浪說神仙煉九還和白秉徳寺中齋宿韻二首蕭寺凄涼月色寒雪消將盡尚留殘自嗔嵗月忙中過暫借楞嚴静裏看同舍謾勞虚左席上方誰許建騷壇明朝又入承明直依舊含香更握蘭齋閣東西各一方燔柴同見燭天光南郊本為蒼生禱東作先祈百榖穰隨世功名成潦倒應人文字恨劻勷洛陽盡是紅塵地不信香山獨不忙仁仲齋居和章盛誇僧寺之美復用前韻戱之䥫衣自慣雪山寒笑殺詩人覔嬾殘梵語本空何足聽天花雖好有誰看北門不信齋無室西域徒聞戒有壇邪正分明如黒白鮑魚莫誤作芝蘭送鄖陽太守胡天叙昔日曾過舊草堂喜聞髙論夜聨牀東曹初受司徒薦南國新分太守章地控三方連隴蜀水流百折到荆襄中間待哺知多少安得人人粟一囊寄堵邦寜碧梧翠竹水雲鄉中有幽人行最方洗耳不教聞理亂逢人秪自說畊桑春來秉筆修茶譜花發隨時具酒觴天與清閒渾不識登臨猶恨一身忙寄任十而翁與我是忘年我憶而翁願爾賢孝似曾參寜過分弟如王覽亦當然夜深燈火冝勤學雨足郊原好種田勿逐少年逰俠伴鬬鷄走馬縣門前次國賢韻送浹姪城東水竹有新居盡是前人手澤餘羣從中間惟汝長百年譜牒至今虛北來暫假朝天夢南去還看種樹書行役到家應自樂風波𣺌𣺌更愁予夀徳輝母某太夫人近時王母定何居不在瑤池在帝都堦下行厨麟作脯曲中新譜鳯將雛時徳輝與其子守仁皆在朝紅顔不假榴花暎健歩何須竹杖扶愛日恩光天假貸青官輟講助歡娛挽吳汝礪生為同姓客為隣每愛交逰我獨真字法近從山谷變詩才惟許宛陵親身嘗百藥猶多病家累千金尚似貧後日書香知未斷嬰兒風骨已驚人次守溪少宰夜飲韻妙句曾題邴曼容守溪贈行詩有宦况輕於邴曼容之句至今什襲未開封袖中懐刺羞頻謁馬上趨朝喜暫逢仕宦心輕今更嬾登臨興在老尤濃洞庭湖水東山路杖屨何時得逺從送蘇伯誠由江西改四川提學馬上作長空雪霽朔風號送客方知去客勞蜀道莫言今日易廬山還似舊時髙璽書新換增光彩旌節長懸脫羽毛試看青襟誰最好筆頭滚滚帶春濤邦彦第四和章不至復用韻促之詩人不厭六蟲號奴厭詩筒入逓勞東野久知韓子富老坡獨數柳州髙任教勍敵輕鷄肋却喜寒林得鳯毛凍硯頻烘𤣥浪湧小奚誤指作溪濤次仲實詠雪六花莫認作飛霜疋練誰家有許長當午漸踈知避日迎風不下欲循墻太平有意先呈瑞輕薄何須更學狂莫與梅花較優劣縱多一出已輸香送伍朝信省祖記得嬉逰大父前分甘膝上是何年朗陵老去思荀彧靈運歸來拜謝𤣥新製綵衣初試舞舊騎竹馬尚依然碧桃花下稱觴處更祝靈椿夀八千挽章恭毅公囘天力仗一封書震地雷霆我自如海内瘡痍何日起胷中孤憤㡬時攄狄公直諫安唐室商皓危言定漢儲慙愧後公三十載無由一束致生芻小茅山書屋小結茅山屋數椽藏書却笑米家船長簷不解䕃歌舞净几偏宜閣簡編蝌蚪影涵春雪裏伊吾聲落晩風前遙看翠竹蒼松外時有虹光夜燭天挽周尚書入官已不為身謀壯嵗聲名動冕旒執法堅如于定國活民多似富青州官居廊廟無遺恨老去江湖有逺憂試問近來諸老宿立朝還有此公不送鄧生下第壯嵗才名已不羈儒冠誤子亦多時從知照乗珠難售方信千鈞弩獨遲夜雨青燈愁客夢秋風澤國動鄉思何年挾䇿重來此折取蟾宫第一枝送段惟勤宰新城龔黄卓魯是何人千載令人仰後塵寜拙催科書下考莫由㨗徑問通津公門似水誰嫌簡馬骨如山始信貧三尺待君來執法觸邪還見廌冠新夀大理陳少卿母九十不在山間與水邊女中亦自有神仙種桃直待三千嵗屈指纔過九十年嫁日舊衣何太窄滿頭黒髪尚依然白雲似解賢郎意片片飛來棘寺前挽歐時舉次蘇伯誠韻白髪瀛洲苐一仙同年庻吉士時舉最長王堂閒暇日如年文興六一將衰後易究乾坤未畫前武帝不知顔駟老漢廷偏讓賈生賢可憐才大終難用祿薄無由滿二千少年不作探花郎老去功名心更忙白髪窮愁多夜雨青雲得雋已斜陽殿前同對三千字門下誰持一瓣香丹旐飛飛歸舊路旅魂彷彿記吾常送南京張學士先生東白文章舊有聲金縢國史誥初成南都命下新承寵九月秋髙始啓行鈴索不愁深夜警官銜猶帶北門清石頭城外秦淮口一片輕㠶挂月明夀程宗魯父母湘流曲折遶長沙百嵗巖髙石徑斜深静初疑王母宅幽閒又道葛洪家堦前袖手調青鳥花下浮觴泛紫霞囘首綵衣千里外楚山時被白雲遮送守溪乃兄世隱東歸難弟歸來兄亦歸髙堂齊著老萊衣洞庭金橘霜前熟笠澤銀魚雨後肥伐木有聲來户牖采薪無伴扣巖扉山邊水次逢人語莫道長安是與非送體齋先生省祭學士歸來掃墓田天風特為舞松杉鹽梅久待調商鼎版築猶思在傅巖墓左豐碑仍舊額祠中木主換新銜碧山不是流連地顒望春江挂錦㠶送聚上人還普應寺鈴語遙遙紫翠間分明為報逺公還龍施法雨迎新檄雪作天花散舊山净土未歸飛錫逺清淮初渡木杯閒從今髙卧雙松底便是淵明嬾出闗夀丘閣老先生官居鼎鼐秪如貧贏得聲名動紫宸一代文章歸館閣三千禮樂化成均壯年報國丹心在老去憂民白髪新試問開元到今日匹休房杜有何人和陳大理麻姑韻白墮年來善竊名瀼西珍重瀼東輕富人只解藏千斛靈藥何曾斬一莖知為老生虚左席尚留餘瀝在空罌明朝雪滿長安道不惜衝泥問麯生昨汝礪選部傳示麻姑之作深以不與此㑹為恨及見汝礪乃云疇昔之夜所飲多蘇酒後出麻姑數杯真偽未可知疑以予故而有所吝且盤餐又皆全卿餕餘殊無主客禮以是枵腹東歸作惡者兩日予亟欲索飲為二家分别是非又以祈雪在齋居中因次前韻簡成甫併全卿庻來日續前盟以雪厚誣無謂我為惡客也飲陳大理麻姑戯用前韻奉謝夜來惡客已除名從此西人不敢輕細斫江魚成雪膾旋燒野菜帶霜莖燭殘逗遛須明月缾罄搜尋倒别罌公子乗閒能過我濁醪許借有隣生齊魯觀風送熊繡衣百里孤城海岱中鷺車隨處問民風東看蜃氣朝成市西望天門太山有東西二天門暮倚空仲父塚前春草綠齊桓祠下野花紅如何今日營丘裏村社人多拜蓋公送李宗淵南還文采風流阮步兵窮途猶負少年英詩因失意長懐憤客未深知嬾出迎萬里空懐投筆嘆一時誰識棄繻生醉邊離恨都消盡又聽鶯啼四五聲送華文光下第南還上林花木亂紛披正是東風力軟時羣蝶漫教争落絮靈烏直欲占全枝側身歸去何妨逺整翮重來未當遲萬里雲霄須自惜弋人誰識羽毛竒夀維之父母人間何處近蓬瀛滄海東頭第一城門外碧桃花未老庭前丹桂子初生兩迴甲子從頭數重受官銜徹底清白首相看無箇事含飴日日有餘情送李孟寅下第長安已誤看花期千里鄉園有夢思貧乏故人同卧起蕭條官道獨凄其雲飛每恨青山隔水涸長嫌畫舫遲試問長年何日到芙蓉秋水未開時題新㑹書屋圖百尺江流浸白沙綠隂深處是誰家雨催春去少啼鳥風送晩來多落花架上古書編甲乙筆頭新語帶烟霞主人素有文園渇日日濃煎七碗茶榆錢紛紛榆莢送殘春鵞眼成堆不濟貧白屋漫飛寜有母朱門雖入未通神天生肉好周遭在地作罏錘鼓鑄新秪恐貪夫看不破對人猶自欲傾身立夏日郊行約介夫先生不至春光纔盡落花稀追補春逰尚未遲滿地綠隂如布席撲人飛絮似撩詩便先數日有何好再後㡬時無此竒笑殺城東草𤣥者獨眠髙閣未曾知送當塗張教諭子充表弟中表文章百煉金逼人驚爾氣駸駸偶然名落書金榜贏得官清比翰林伏櫪可能忘逺志短檠猶自識初心明朝捧檄江城去采石磯邊水正深送徐子仁兩䄂披披興浩然兒童多識是髯仙子仁號搜竒二酉雲生履覽勝三江月滿船無處不為詩債苦有時還向酒家眠到頭懐土心難遣此日登樓憶仲宣送李希賢浙江提學十年髙卧玊堂寒今日方辭苜蓿盤冠似惠文非法吏職居亷訪却儒官芙蓉江上迎旌節鷹隼秋深振羽翰便道過家無百里重闈尤喜問平安觀國趨庭送介夫乃弟誰似君家父子賢一門圭組自相傳過庭便可詢竒字侍寢猶能問太𤣥紅日舉頭天尺五白雲囘首路三千伯兄此别應多恨夢裏何時見惠連送吳先生恕落木蕭蕭動客情寒砧又起助秋聲逐南飛鴈過江去望北固山驅馬行贈别詩多囊槖重闗心事少往來輕到家松菊渾無恙稚子牽衣一笑迎送李子陽歸省自將心事奏楓宸不比尋常愛乞身清夜偶成炊臼夢白頭還憶倚閭人旌旗壓捺潮聲小樽酒招呼月色新問罷起居還就道東風莫戀碧山春送張朝敬下第春闈漫說得人多麟鳯依然漏網羅天與竒毛終奮迅我憐逸足暫蹉跎思鱸莫認為張翰抱璞誰知是卞和明日西風江上路芙蓉花影蕩秋波送張大尹青山重疊䕶城樓城下人家瞰碧流地盡畊桑民尚困境多盗賊吏多愁分符未報三年政捧檄先懐百里憂為問袁公何徳化至今血食未曾休送劉衡仲宰濬縣此地曾迴墨子車君行切莫更躊蹰舊時風俗多酣酒今日人家半讀書野外勸畊春雨足簾前聽訟曉星疏嚴君治縣應留譜善政先看視篆初送李徳馨司訓饒州白也詩豪復酒豪雲孫今日更風騷朝成百韻才猶鬰暮飲千觚興轉髙祿可代畊寜怨薄職當授業敢言勞秋風彭蠡洲前醉筆底翻翻滚翠濤賀屠冢宰乃翁封少保垂垂白髪碧方瞳五見封章到浙東今日海濱無二老古來林下少三公康强疑是神仙侣寛厚猶存長者風莫道松牕真遯世權衡人物是誰功送西安太守報政歸來五馬閒停車隨處看青山舊聞民瘼還重問新賦詩篇不再刪風送虎符歸少華雨隨熊軾過潼闗趙張已去三王逺合置君侯伯仲間長春軒四時花木繞欄杆倚杖朝朝帶笑看樹㡳清風能却暑牀頭新酒可袪寒地偏客少門長閉老去心閒夢自安睡起不知天早晩碧牕紅日正三竿夀秦汝厲父當門喬木碧千尋一巻先天萬古心設帳馬融無伎樂傳經劉向在山林堂前弧矢春生影花㡳壺觴夕借隂千里鳯雛來獻夀居家何必積黄金重九前一日同王地官徳華過袁太守山莊匹馬來逰五柳莊主人渾不似柴桑指天論事知多憤擊鉢催詩覺太忙丹藥未成留宿火菊花將發待重陽醉中激烈歌聲起不放行雲過短墻㳺功徳寺次朝文韻二首登髙俯視亂山低山勢如攅萬馬蹄石壁倒懸霄漢外玉泉斜注寺橋西龍從千尺淵中卧僧向三义路口迷時有僧隨行誤引至西直門故云習習香風携滿袖却疑騎馬過蘇堤野寺門前信馬過莫將塵土涴煙蘿雲蒙山頂晴猶雨月浸潭心水不波青杏子垂珠蓓蕾紫藤花發錦曼陀詩人興在留衣外石壁新題不厭多用守溪韻送儉弟布衣相見又空還好去留心几格間無月讀書方就寢有詩題石始登山下帷董子寜思佚運甓陶公不愛閒自恨青春皆浪過於今為爾惜紅顔又用前韻寄三叔曉入承明近午還未容髙卧草堂間醉中病酒猶呼酒夢裏登山始見山千古文章成底用百年冠蓋有誰閒題詩再拜呈諸父始覺王濛益厚顔惠卿惠詩次韻奉荅綠隂庭院晝沈沈哽咽蟬聲助苦吟戰北夷吾非是怯傳經劉向亦何心惠卿秋闈不㨗設帳授徒故云燈前羣從能分韻眼底誰人利斷金莫怪秋來少飛鴈長安西去塞雲深山癯為張信卿作用亷伯先生韻宦途誰憶北山薇今日君知昨日非憂在江湖人合瘦戰殘聲利體應肥饑膓滿貯三千巻空谷偏宜百結衣門外落花深一尺漫憑詩酒解愁圍送仲惟馨東風捲地落花殘倦鳥應知息羽翰春雨足時初試屐青山好處一凴䦨藥籠舊蓄三年艾金鼎新成九轉丹醫國醫民心未巳可能髙枕卧江干賀陳方伯生子六十年餘始弄璋熊羆先已兆禎祥髙門蓬矢春生影老蚌明珠夜吐光别鵠暗憐商穆子傳家翻笑蔡中郎從知𤓰瓞宜秋圃清露瀼瀼百尺長樂漁為李汝璧乃翁賦百尺清流遶碧岑黄塘遺老興何深棹歌聲落紅蓮渚蓬屋詩成古栁隂剖粒自當輕萬戸一絲終不換千金騎鯨本是公家事莫道漁翁秪姓任送將樂李大尹熈考滿還任分符逺在劍溪旁薦疏嘗聞奏建章令尹每稱民樸魯閭閻惟說吏循良桑枝帶雨村村綠麥穗連雲處處黄歸向石頭城下過還將治績報髙堂寒夜獨坐用前韻床頭酒熟不須賖墻外簫聲隔㡬家簷溜漸氷疑作柱燈光無焰未成花雪山尚記形如舊月殿平看影欲斜吟退筆尖髯凍折要將冷澹向誰誇贊皇凌訓導書至感嘆有作寒燈寂寞夜窓虚誰信官居似客居俸薄未能供伏臘道存應不廢詩書燕山北去梅花少易水西來鴈影疎莫道玉堂霄漢上故人無力薦相如雙龍道院雙溪曲繞雙峰下翠碧空涵老子宫朝斗壇開雲起處步虚人在月明中石門夜濕莓苔雨蘿磴秋生劍履風習静每來依道侣卜隣非為道相同立春後二日通宵不寐天明乃夢到家平生性懶長貪睡何事春宵睡未濃作意不看殘夜月清心又聽五更鐘夜無好夢隨雙蝶眉有閒愁蹙兩峰合眼朝來到鄉社滿溪春草綠茸茸請同年諸公過院中齋宿玉堂近在鳯樓東長見文光駕綵虹中夜不妨迎勅使故人尤便逓詩筒向陽樹得春光早臨水牕涵日影紅何事欲居蕭寺裏撞鐘擊鼓聽談空元宵三首天上今宵月色多人間到處有笙歌寳燈燦爛成銀樹星斗分明落絳河萬嵗山前仙掌動百花香裏輦塵過教坊音樂應無數獨有清平調是和莫道君門萬里賖君心如燭照民家瑶笙夜啟千門月火樹晴連萬井花鳯闕上臨珠斗近鰲峰髙礙彩雲斜輕烟試看歸何處化作天邊五色霞華燈淡月鬬清光玉漏遲遲夜正長韶樂奏時雙鳯舞輦塵生處百花香綵山巧對龍樓外仙掌平分御座旁宴賞每懐憂惕在宵衣傳授自先皇聞命有喜南北隨人有重輕出門何必問春明莫言㳺宦非鄉土須識留都是帝京色養少酬平日願官銜不减舊時清三千里路看山去忘却乗舟觸熱行渡口曉行曉色蒼蒼暑氣平綠楊深處有人行百年沙岸隨流徙五夜風㠶趂月明歸客未能離北土野禽先解學南聲濁流到此應窮盡遙記清源是驛名送沈夀卿鄉園忽隔三年别京國俄成八月留夜雨牕前長對榻秋風江上又同舟帶圍漸覺休文瘦時事新添季子愁他日相逢定何處杏花紅滿曲江頭過淮用渡口韻雨收風定水波平畫槳雙敲自在行到處酒帘迎棹舞㡬船漁火隔江明峰頭栁亂旌旗影水底蛙喧鼓吹聲屈指過淮今八度津人相見亦知名挽徐徳重吳門昔有隱君子家住洞庭山上頭詩律深嚴唐句法衣冠典雅晉風流閒看白鹿眠深草時許沙鷗近釣舟萬事從今總零落獨餘明月照荒丘送徐州蘇指揮致仕六十年來萬慮輕眼前無物更闗情碭山草綠春歸馬泗水風寒夜洗兵野外懶窺烽火影帳前愁聽皷鞞聲獨懐聖主恩難報尺籍長留子姓名送黄司空昔年冀北公辭我今日江東我送公報政豈應如許速愛君曽有㡬人同山因剪伐材將竭民為徴求力已窮誰向九重陳至計班行瞻望老司空和西涯先生夜坐韻玉堂深處不勝寒彩筆新題暎雪看有約買田來敝里何時騎馬出長安閉門自覺賓朋逺倚杖猶稱拜起難海内名山應有數登臨髙興未應闌送沈克寅我視尊翁作少年爾今頭角已嶄然讀書好破三千巻時譽應歸尺五天萬里雲霄無弱羽一家衣鉢有真傳從祖司空先生弱冠登科故云自來建業由勤苦莫愛山窻日晏眠七言絶句元宵應制鰲頭矗矗煙花裏鳯閣層層錦繡中月色總饒通夜白燈光已占十分紅雪霽雲開月色寒六街燈火萬人看檄書忽報將軍㨗夜奪崐崙第一闗送萬克修歸省婺星錯落照慈闈趂此秋風月夜歸舊日斑衣猶在笥一畨起舞一光輝含毫且勿賦秋聲共看新秋新月生一㸃清光雖似小絶勝十五後來明寄儉弟露下空庭月滿除清宵憶弟意何如天邊無數南來鴈不為儂家帶一書客牕聞雨宦情羈思兩悠悠落葉寒聲戰暮秋今夜蕭蕭牕外雨無端添得許多愁題王寳扇寳有梅花百咏寒梅無意鬬春妍吟到逋翁覺已煩誰道暗香疎影外勞君又著五千言寄李太守仙翁長日愛彈碁敵手於今更有誰聞說西隣姚弋仲未曽戰北氣先衰送陸全卿巡按福建問君頭上是何冠到處能令暑作寒只恐馬前霜易落荔枝五月未成丹方山四景千株萬株山杏開無奈開時驟雨來半委泥沙半流水山靈亦自為花哀右杏林春雨暮門斜日對寒流一片雲凝萬古愁泉底有人呼不覺白衣蒼狗自悠悠右覺渚寒雲粤王遺隴名猶在古木疎疎半已枯每到月明霜滿地直教啼殺樹頭烏右粤隴鳴烏山作圍屛對面張疎林木末掛斜陽王孫莫射西飛鶴雲外仙人恐姓方右方山歸鶴題畫二首誰言髙樹獨靡隂六月凉風自不禁相對可能無一語含毫為調水龍吟右哦松逺汲清泉溉欲深童兒那識汝翁心虞廷六管終須備不為春來十畆隂右灌竹待隱園次楊太宰韻綠樹鶯啼春正深絮飛花落滿園林長松不改青青色嵗暮相看共此心圉圉洋洋樂有餘誰言我獨不知魚縱教九島迴千里那比江湖得自如待隱園依北固山題名石在墨痕乾何時布襪青鞋去老眼摩挲試再看芙蓉枝上露華清楊柳隂中獨自行江上美人期未至停歌不發更含情洗竹從來為太繁獨留髙節與人看渭川空自誇千畆争似公家只數竿一葉扁舟十幅蒲長竿短髪傍江湖不知𣺌𣺌煙波裏曾見逃名范蠡無松間石上聽鳴泉清比琴聲更自然有客欲來醒俗耳掛冠已約在明年清風明月兩無求花逕柴門日轉幽莫怪主人歸較晩君王有詔欲分猷題扇寄徐文烱表姪東風力軟落花輕一曲離歌客未行載酒滿船還載月坐聽啼鳥溧陽城題沈克寅扇綠楊黄鳥試春聲畫舫朱簾送客行醉後不知君别去醒來猶記溧陽城明妃詞西風冽冽塞雲愁凍合長河水不流只恐妾顔明日改單于輕易犯邊州玉顔一去黄金殿香骨終埋白草原千載逰魂歸不得至今青塚尚含寃宫詞二首花影疎疎月影昬沈沈魚鑰鎖重門無端步下空堦立踏破蒼苔石上痕清簟疎簾困日長南風時送芰荷香隔牕女伴來相約同到池頭納晩涼塞下曲一聲畫角起邊愁滿目黄雲暗戍樓夜半將軍傳號令明朝要斬郅支頭邊城九月雪飛花睥睨髙寒集暮鴉今日樓蘭猶未滅沙塲戰士莫思家送三弟東歸燈前相對一尊同衰頰那知是酒紅醉後已忘離别恨樓頭又聽呌霜鴻東籬秋菊試新黄江岸蒹葭未著霜路入故鄉三百里遙看鴈影落横塘寄丁芝山聞君脉理見秋毫袖裏咸陽術更髙芝草滿山光曄曄常分一葉惠兒曹秋夜雨止風作秋隂初散雨初晴颯颯西風夜有聲夢繞五雲溪上路不知身在石頭城紀夢靈椿彫落已多時猶記當年澗壑姿昨夜夢中真想見分明月影過南枝大椿不駐八千秋空使孤兒日日愁獨有當時枝上月至今還照屋西頭示驥兒未嘗糠覈體何肥空有便便腹十圍但願吾兒勤苦學何愁清痩不勝衣夢寐分明在碧山澗泉深處洗塵顔從來只說休官易今日誰知退亦難送沈四舅花外鶯啼三兩聲坐中有客不勝情縱令花落春光老猶向垂楊樹底行雨中與沈克寅賞蓮二絶紅蓮花映白蓮開花影交加入酒杯疑是南威與西子雙雙聨袂雨中來西洴溪上萬花開季子門前錦作堆花笑主人何太俗秋風將起未歸來席上戲贈冩真龔士常不冩褒公與鄂公却來吳下冩吳翁衰容老眼都相似獨不能摸左耳聾汪海雲為驂兒畫白雞鮮潔可愛戯題一絶菊叢東畔石䦨西素質天然不染泥玉漏未殘天未曉莫教輕易草間啼海雲又為駟兒冩赤雞形差小而有文復戱題一絶絳幘低低距未長自知不入鬬雞塲宋公相對談𤣥處應有旁人擬鳯凰哭李充昭虚堂落筆鬼神驚生縳龍蛇卧素屏莫怪遺文無諌草白麻猶未拜延齡題栁燕深深庭院鎖春愁盡日珠簾不上鈎懶入茅簷定巢壘暫時飛向栁枝頭和國賢謝茶雨坼靈芽我發船北風吹斷碧山煙一杯未觧文園渇七碗何能到玉川品茶世獨推陽羨評水人多說慧山今日相從調衆口莫教騰沸鼎鐺間士修惠左傳一部已為峽水所壊後加裝潢又㡬為風雨所漂因成一絶昔年沈没黄牛峽今日漂零季子家左氏兩遭風雨厄天公應是猒浮誇秋江一棹萬里長江一鏡平空林落葉戰秋聲孤舟不畏歸來晚已見沙頭候火明謝汝礪惠橘次韻百顆匀圓逺寄將青虬小卵半塗黄詩人莫作多酸恨採日應知未著霜題猫捕蜻蜓圖養得貍奴善匿形閒來花外撲蜻蜓不知黠鼠渾無忌白晝徐徐出外庭呉文肅摘稿巻二
